
<!DOCTYPE html>

<title>Casino Schedule</title>
<!-- 5단계: 화면 2 Find Dealer + 화면 3 Calendar (2026-05-25) -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1f2328);
    --hint: var(--tg-theme-hint-color, #6e7781);
    --link: var(--tg-theme-link-color, #2481cc);
    --btn: var(--tg-theme-button-color, #2481cc);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --bg-sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
    --vac: #A8D5FF; --off: #FFE680; --pre: #FFC58A; --spl: #D8B4FE;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; overflow-x: hidden; }
  .app-header { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--bg-sec); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .app-header .left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .app-header h1 { margin: 0; font-size: 17px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .back-btn { background: var(--bg-sec); border: none; color: var(--text); padding: 5px 10px; border-radius: 14px; font-size: 13px; cursor: pointer; }
  .lang-toggle { background: var(--bg-sec); border: none; color: var(--text); padding: 5px 10px; border-radius: 14px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .lang-toggle .active { font-weight: 700; color: var(--btn); }
  main { padding: 14px; max-width: 720px; margin: 0 auto; }
  .card { background: var(--bg-sec); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .card h2 { margin: 0 0 8px; font-size: 15px; font-weight: 600; }
  .card .hint { color: var(--hint); font-size: 13px; margin: 4px 0; }
  .btn { display: inline-block; background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
  .btn.ghost { background: var(--bg-sec); color: var(--text); border: 1px solid var(--hint); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-row .btn { padding: 14px 10px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .btn-row .btn .emo { font-size: 22px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; }
  .legend-item { display: inline-flex; align-items: center; gap: 4px; }
  .swatch { width: 16px; height: 16px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.15); display: inline-block; }
  .fullscreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; text-align: center; z-index: 100; }
  .fullscreen .icon { font-size: 56px; margin-bottom: 16px; }
  .fullscreen h2 { margin: 0 0 8px; font-size: 18px; }
  .fullscreen p { color: var(--hint); margin: 4px 0; font-size: 13px; max-width: 90%; }
  .fullscreen pre { color: var(--hint); font-size: 10px; text-align: left; background: var(--bg-sec); padding: 8px; border-radius: 6px; max-width: 100%; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  .fullscreen .btn { margin-top: 18px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--bg-sec); border-top-color: var(--btn); border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .meta-grid { display: grid; grid-template-columns: max-content 1fr; gap: 4px 12px; font-size: 12px; }
  .meta-grid dt { color: var(--hint); }
  .meta-grid dd { margin: 0; word-break: break-all; }
  .placeholder-icon { font-size: 48px; text-align: center; margin: 10px 0; }

  /* 4b: 시프트 탭 + 4주 네비 */
  .shift-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .shift-tab { background: var(--bg-sec); color: var(--text); border: 1px solid transparent; padding: 10px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; line-height: 1.2; }
  .shift-tab .sub { display: block; color: var(--hint); font-size: 10px; font-weight: 400; margin-top: 2px; }
  .shift-tab.active { background: var(--btn); color: var(--btn-text); border-color: var(--btn); }
  .shift-tab.active .sub { color: var(--btn-text); opacity: 0.85; }
  .anchor-nav { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-top: 10px; }
  .anchor-nav .ghost { background: var(--bg-sec); color: var(--text); border: 1px solid transparent; padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .anchor-nav .range { font-size: 12px; color: var(--hint); flex: 1; text-align: center; min-width: 0; }

  /* 5단계: 검색 + 필터 */
  .search-bar { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--hint); background: var(--bg); color: var(--text); font-size: 14px; }
  .filter-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .filter-row select { flex: 1; min-width: 90px; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--hint); background: var(--bg); color: var(--text); font-size: 13px; }
  .result-count { font-size: 12px; color: var(--hint); margin: 8px 0; }
  .staff-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; background: var(--bg-sec); margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; }
  .staff-card:active { border-color: var(--btn); }
  .staff-card .avatar { font-size: 22px; }
  .staff-card .body { flex: 1; min-width: 0; }
  .staff-card .name { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .staff-card .sub { font-size: 11px; color: var(--hint); }
  .staff-card .status { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--bg); }
  .staff-card .status.vac { background: var(--vac); color: #1a3a5a; }
  .staff-card .status.off { background: var(--off); color: #5a4500; }
  .staff-card .status.pre { background: var(--pre); color: #6a3a00; }
  .staff-card .status.spl { background: var(--spl); color: #4a2a6a; }

  /* 5단계: 캘린더 */
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin: 8px 0; }
  .calendar .head { font-size: 11px; color: var(--hint); text-align: center; padding: 4px 0; font-weight: 600; }
  .calendar .head.sun { color: #d94545; }
  .calendar .head.sat { color: #3b6ec7; }
  .day-cell { aspect-ratio: 1; border-radius: 6px; background: var(--bg); border: 1px solid var(--bg-sec); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; line-height: 1.1; padding: 2px; }
  .day-cell.today { outline: 2px solid var(--btn); }
  .day-cell.outside-month { opacity: 0.5; }
  .day-cell.viewer { cursor: default; }
  .day-cell .d { font-size: 12px; font-weight: 600; }
  .day-cell .lbl { font-size: 9px; font-weight: 700; margin-top: 1px; }
  .day-cell.vac { background: var(--vac); color: #1a3a5a; }
  .day-cell.off { background: var(--off); color: #5a4500; }
  .day-cell.pre { background: var(--pre); color: #6a3a00; }
  .day-cell.spl { background: var(--spl); color: #4a2a6a; }
  .vacation-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: end; margin-top: 6px; }
  .vacation-form label { font-size: 12px; color: var(--hint); display: block; }
  .vacation-form input[type=date] { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--hint); background: var(--bg); color: var(--text); font-size: 13px; }
  .vacation-form .apply-row { grid-column: 1 / -1; display: flex; gap: 8px; }
  .vacation-form .apply-row .btn { flex: 1; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 18px; border-radius: 18px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.25s; pointer-events: none; max-width: 90%; text-align: center; }
  .toast.show { opacity: 1; }
</style>

let LANG = "en";

function setLang(lang) {
  LANG = (lang === "ko") ? "ko" : "en";
  try { localStorage.setItem("scheduleApp.lang", LANG); } catch (e) {}
  document.documentElement.setAttribute("lang", LANG);
  document.querySelectorAll(".lang-toggle [data-lang]").forEach(el => {
    el.classList.toggle("active", el.dataset.lang === LANG);
  });
}

function detectInitialLang() {
  try {
    const s = localStorage.getItem("scheduleApp.lang");
    if (s === "en" || s === "ko") return s;
  } catch (e) {}
  const tg = window.Telegram && window.Telegram.WebApp;
  const c = tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code;
  return (c && String(c).toLowerCase().startsWith("ko")) ? "ko" : "en";
}

function t(key, vars) {
  const dict = I18N[LANG] || I18N.en;
  let s = dict[key];
  if (s == null) { s = "[" + key + "]"; console.warn("[i18n] missing:", key, LANG); }
  if (vars) Object.keys(vars).forEach(k => s = s.replace(new RegExp("\\{" + k + "\\}", "g"), vars[k]));
  return s;
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

// ────────────────────────────────────────────────────────────
// 날짜 유틸
// ────────────────────────────────────────────────────────────
function pad2(n) { return String(n).padStart(2, "0"); }
function fmtDate(d) { return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate()); }
function parseDate(iso) { const [y, m, d] = iso.split("-").map(Number); return new Date(y, m-1, d); }
function addDays(d, n) { const r = new Date(d.getFullYear(), d.getMonth(), d.getDate()); r.setDate(r.getDate() + n); return r; }
function mondayOfThisWeek() { const d = new Date(); d.setHours(0,0,0,0); const dow = d.getDay(); const off = (dow === 0) ? -6 : (1 - dow); return fmtDate(addDays(d, off)); }
function rangeLabel(anchorIso) { const s = parseDate(anchorIso); const e = addDays(s, 27); return fmtDate(s) + " ─ " + fmtDate(e); }
function todayIso() { return fmtDate(new Date()); }

// ────────────────────────────────────────────────────────────
// 네트워크
// ────────────────────────────────────────────────────────────
async function fetchWithTimeout(url, ms, opts) {
  const c = new AbortController();
  const tid = setTimeout(() => c.abort(), ms);
  try {
    return await fetch(url, Object.assign({ signal: c.signal, redirect: "follow", mode: "cors", credentials: "omit" }, opts || {}));
  } finally { clearTimeout(tid); }
}

async function apiGet(action, extraParams) {
  const tg = window.Telegram && window.Telegram.WebApp;
  const initData = (tg && tg.initData) || "";
  const params = new URLSearchParams();
  params.set("action", action);
  if (initData) params.set("initData", initData);
  if (extraParams) Object.keys(extraParams).forEach(k => { if (extraParams[k] != null) params.set(k, String(extraParams[k])); });
  const sep = API_BASE.indexOf("?") >= 0 ? "&" : "?";
  const res = await fetchWithTimeout(API_BASE + sep + params.toString(), FETCH_TIMEOUT_MS, { method: "GET" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return await res.json();
}

async function apiPost(action, body) {
  const tg = window.Telegram && window.Telegram.WebApp;
  const initData = (tg && tg.initData) || "";
  const payload = Object.assign({ action: action, initData: initData }, body || {});
  const res = await fetchWithTimeout(API_BASE, FETCH_TIMEOUT_MS, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=UTF-8" },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return await res.json();
}

function showToast(msg, ms) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  if (el._tid) clearTimeout(el._tid);
  el._tid = setTimeout(() => el.classList.remove("show"), ms || 2400);
}

// ────────────────────────────────────────────────────────────
// 상태
// ────────────────────────────────────────────────────────────
const SCREEN_HOME = "home";
const SCREEN_FIND_DEALER = "find_dealer";
const SCREEN_CALENDAR = "calendar";
const PLACEHOLDER_SCREENS = {
  "vacation_range": { emo: "📅", titleKey: "home.vacation_range", descKey: "placeholder.vacation_range.desc", stage: 5 },
  "breaks_today":   { emo: "☕", titleKey: "home.breaks_today",   descKey: "placeholder.breaks_today.desc",   stage: 6 },
  "shift_cycle":    { emo: "🔄", titleKey: "home.shift_cycle",    descKey: "placeholder.shift_cycle.desc",    stage: 8 },
  "add_staff":      { emo: "➕", titleKey: "home.add_staff",      descKey: "placeholder.add_staff.desc",      stage: 8 },
  "backup":         { emo: "📤", titleKey: "home.backup",         descKey: "placeholder.backup.desc",         stage: 10 }
};

let currentScreen = SCREEN_HOME;
let currentShift = "A";
let currentAnchor = mondayOfThisWeek();
let bootData = null;

// 5단계: 검색 + 캘린더 상태
let searchQuery = "";
let searchFilters = { shift: "all", category: "all", active: "true" };
let searchResults = [];
let searchTotal = 0;
let searchLoading = false;
let searchDebounceTid = null;
let selectedStaff = null;   // 카드 탭 시 임시 저장 (id/name 등)
let staffDetail = null;     // { employee, anchor, dayStates }

function navigate(screen) { currentScreen = screen; render(); }

function setShift(shift) {
  if (shift !== "M" && shift !== "A" && shift !== "N") return;
  currentShift = shift;
  try { localStorage.setItem("scheduleApp.shift", shift); } catch (e) {}
  render();
}

function moveAnchor(days) {
  if (days === 0) currentAnchor = mondayOfThisWeek();
  else currentAnchor = fmtDate(addDays(parseDate(currentAnchor), days));
  try { localStorage.setItem("scheduleApp.anchor", currentAnchor); } catch (e) {}
  render();
}

function loadPersistedState(user) {
  try {
    const s = localStorage.getItem("scheduleApp.shift");
    if (s === "M" || s === "A" || s === "N") currentShift = s;
    else if (user && user.defaultShift) currentShift = user.defaultShift;
  } catch (e) {}
  try {
    const a = localStorage.getItem("scheduleApp.anchor");
    if (a && /^\d{4}-\d{2}-\d{2}$/.test(a)) currentAnchor = a;
  } catch (e) {}
}

// ────────────────────────────────────────────────────────────
// 렌더 — 화면 분기
// ────────────────────────────────────────────────────────────
function render() {
  if (!bootData) return;
  const user = bootData.user || {};
  const isAdmin = !!user.isAdmin;

  // 헤더
  const backBtn = document.getElementById("back-btn");
  const headerTitle = document.getElementById("header-title");

  let title = t("common.app_title");
  if (currentScreen === SCREEN_HOME) {
    backBtn.style.display = "none";
  } else if (currentScreen === SCREEN_FIND_DEALER) {
    backBtn.style.display = "inline-block";
    title = t("home.find_dealer");
  } else if (currentScreen === SCREEN_CALENDAR) {
    backBtn.style.display = "inline-block";
    title = selectedStaff ? selectedStaff.name : t("home.find_dealer");
  } else if (PLACEHOLDER_SCREENS[currentScreen]) {
    backBtn.style.display = "inline-block";
    title = t(PLACEHOLDER_SCREENS[currentScreen].titleKey);
  }
  headerTitle.textContent = title;

  const main = document.getElementById("main");
  if (currentScreen === SCREEN_HOME) {
    main.innerHTML = isAdmin ? renderAdminHome_(user) : renderViewerHome_(user);
  } else if (currentScreen === SCREEN_FIND_DEALER) {
    main.innerHTML = renderFindDealer_();
    bindSearchInput();
    triggerSearch();  // 초기 또는 직전 검색 갱신
  } else if (currentScreen === SCREEN_CALENDAR) {
    main.innerHTML = renderCalendar_(user);
  } else if (PLACEHOLDER_SCREENS[currentScreen]) {
    main.innerHTML = renderPlaceholder_(currentScreen);
  } else {
    main.innerHTML = renderAdminHome_(user);
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function renderShiftAndAnchor_() {
  return `
    <div class="card">
      <h2>${t("home.shift_view")}</h2>
      <div class="shift-tabs">
        ${["M","A","N"].map(s => `
          <button class="shift-tab ${currentShift === s ? "active" : ""}" data-shift="${s}">
            ${t("shift." + s + ".full")}<span class="sub">${t("shift." + s + ".time")}</span>
          </button>
        `).join("")}
      </div>
      <div class="anchor-nav">
        <button class="ghost" data-anchor-delta="-28">${t("common.prev_4w")}</button>
        <span class="range">${escapeHtml(rangeLabel(currentAnchor))}</span>
        <button class="ghost" data-anchor-delta="0">${t("common.today")}</button>
        <button class="ghost" data-anchor-delta="28">${t("common.next_4w")}</button>
      </div>
    </div>
  `;
}

function renderAdminHome_(user) {
  const name = (LANG === "ko" && user.name_ko) ? user.name_ko : (user.name_en || user.id);
  return `
    <div class="card">
      <h2>${escapeHtml(t("boot.welcome_admin", { name }))}</h2>
      <p class="hint">${escapeHtml(user.category)} · ${escapeHtml(t("shift." + user.defaultShift + ".full"))} · ${escapeHtml(t("boot.role_admin"))}</p>
    </div>
    ${renderShiftAndAnchor_()}
    <div class="card"><h2>${t("boot.legend")}</h2>
      <div class="legend">
        <span class="legend-item"><span class="swatch" style="background:var(--vac)"></span>${t("state.vacation.short")} · ${t("state.vacation.full")}</span>
        <span class="legend-item"><span class="swatch" style="background:var(--off)"></span>${t("state.dayoff.short")} · ${t("state.dayoff.full")}</span>
        <span class="legend-item"><span class="swatch" style="background:var(--pre)"></span>${t("state.pre_practice.short")} · ${t("state.pre_practice.full")}</span>
        <span class="legend-item"><span class="swatch" style="background:var(--spl)"></span>${t("state.special.short")} · ${t("state.special.full")}</span>
      </div>

    <div class="card"><h2>${t("home.quick_actions")}</h2>
      <div class="btn-row">
        <button class="btn" data-nav="${SCREEN_FIND_DEALER}"><span class="emo">👤</span>${t("home.find_dealer")}</button>
        <button class="btn" data-nav="vacation_range"><span class="emo">📅</span>${t("home.vacation_range")}</button>
        <button class="btn" data-nav="breaks_today"><span class="emo">☕</span>${t("home.breaks_today")}</button>
        <button class="btn" data-nav="shift_cycle"><span class="emo">🔄</span>${t("home.shift_cycle")}</button>
        <button class="btn" data-nav="add_staff"><span class="emo">➕</span>${t("home.add_staff")}</button>
        <button class="btn" data-nav="backup"><span class="emo">📤</span>${t("home.backup")}</button>
      </div>
    </div>
  `;
}

function renderViewerHome_(user) {
  const name = (LANG === "ko" && user.name_ko) ? user.name_ko : (user.name_en || user.id);
  return `
    <div class="card">
      <h2>${escapeHtml(t("boot.welcome_viewer", { name }))}</h2>
      <p class="hint">${escapeHtml(user.category)} · ${escapeHtml(t("shift." + user.defaultShift + ".full"))} · ${escapeHtml(t("boot.role_viewer"))}</p>
    </div>
    <div class="card"><h2>${t("my.todays_breaks")}</h2>
      <p class="hint">${t("my.no_breaks_today")}</p>

    <div class="card">
      <button class="btn" data-nav="${SCREEN_FIND_DEALER}" style="width:100%;">👤 ${t("home.find_dealer")}</button>
    </div>
    <div class="card"><p class="hint">${t("my.contact_admin_for_off")}</p></div>

}

function renderPlaceholder_(screen) {
  const cfg = PLACEHOLDER_SCREENS[screen];
  if (!cfg) return "";
  return `
    <div class="card">
      <div class="placeholder-icon">${cfg.emo}</div>
      <h2 style="text-align:center;">${t(cfg.titleKey)}</h2>
      <p class="hint" style="text-align:center;">${t(cfg.descKey)}</p>

// ────────────────────────────────────────────────────────────
// 화면 2: Find Dealer
// ────────────────────────────────────────────────────────────
function renderFindDealer_() {
  return `
    <div class="card">
      <input type="text" id="search-q" class="search-bar" placeholder="${escapeHtml(t("search.placeholder"))}" value="${escapeHtml(searchQuery)}">
      <div class="filter-row">
        <select id="filter-shift">
          <option value="all">${t("search.filter_all_shifts")}</option>
          <option value="M">${t("shift.M.full")}</option>
          <option value="A">${t("shift.A.full")}</option>
          <option value="N">${t("shift.N.full")}</option>
        </select>
        <select id="filter-category">
          <option value="all">${t("search.filter_all_cat")}</option>
          <option value="dealer">${t("search.filter_dealer")}</option>
          <option value="supervisor">${t("search.filter_supervisor")}</option>
        </select>
        <select id="filter-active">
          <option value="true">${t("search.filter_active")}</option>
          <option value="false">${t("search.filter_inactive")}</option>
          <option value="all">${t("search.filter_all_shifts")}</option>
        </select>
      </div>
      <div class="result-count" id="result-count">${searchLoading ? t("common.loading") : ""}</div>
      <div id="search-results">
        ${searchResults.length === 0 && !searchLoading ? `<p class="hint" style="text-align:center;">${t("search.no_results")}</p>` : ""}
        ${searchResults.map(s => renderStaffCard_(s)).join("")}
      </div>
    </div>
  `;
}

function bindSearchInput() {
  const q = document.getElementById("search-q");
  if (q) {
    q.addEventListener("input", (e) => {
      searchQuery = e.target.value;
      if (searchDebounceTid) clearTimeout(searchDebounceTid);
      searchDebounceTid = setTimeout(() => triggerSearch(), 300);
    });
  }
  ["filter-shift","filter-category","filter-active"].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    sel.value = searchFilters[id.replace("filter-","")];
    sel.addEventListener("change", (e) => {
      searchFilters[id.replace("filter-","")] = e.target.value;
      triggerSearch();
    });
  });
}

async function triggerSearch() {
  searchLoading = true;
  updateSearchUI_();
  try {
    const r = await apiGet("searchStaff", {
      q: searchQuery, shift: searchFilters.shift, category: searchFilters.category,
      active: searchFilters.active, limit: 50, offset: 0
    });
    if (r && r.ok && r.data) {
      searchResults = r.data.items || [];
      searchTotal = r.data.total || 0;
    } else {
      searchResults = []; searchTotal = 0;
      showToast(t("toast.action_failed", { msg: (r && r.error && (LANG === "ko" ? r.error.message_ko : r.error.message_en)) || "?" }));
    }
  } catch (err) {
    searchResults = []; searchTotal = 0;
    showToast(t("toast.action_failed", { msg: err.message || err }));
  } finally {
    searchLoading = false;
    updateSearchUI_();
  }
}

function updateSearchUI_() {
  const rc = document.getElementById("result-count");
  if (rc) {
    rc.textContent = searchLoading ? t("common.loading")
      : (searchResults.length === 0 ? t("search.no_results") : t("search.showing", { n: searchResults.length, total: searchTotal }));
  }
  const r = document.getElementById("search-results");
  if (r) {
    if (searchResults.length === 0 && !searchLoading) {
      r.innerHTML = `<p class="hint" style="text-align:center;">${t("search.no_results")}</p>`;
    } else {
      r.innerHTML = searchResults.map(s => renderStaffCard_(s)).join("");
    }
  }
}

function renderStaffCard_(s) {
  const name = (LANG === "ko" && s.name_ko) ? s.name_ko : (s.name_en || s.id);
  const sub = (s.category === "dealer" ? "🃏" : "🎯") + " " + escapeHtml(s.category) + " · " + escapeHtml(t("shift." + s.defaultShift + ".full"));
  let statusHtml = "";
  if (s.todayState === "vacation") statusHtml = `<span class="status vac">${t("state.vacation.short")}</span>`;
  else if (s.todayState === "dayoff") statusHtml = `<span class="status off">${t("state.dayoff.short")}</span>`;
  else if (s.todayState === "pre_practice") statusHtml = `<span class="status pre">${t("state.pre_practice.short")}</span>`;
  else if (s.todayState === "special") statusHtml = `<span class="status spl">${t("state.special.short")}</span>`;
  else statusHtml = `<span class="status">${t("search.status_working")}</span>`;

  return `
    <div class="staff-card" data-staff-id="${escapeHtml(s.id)}" data-staff-name="${escapeHtml(name)}">
      <div class="avatar">👤</div>
      <div class="body">
        <div class="name">${escapeHtml(name)}</div>
        <div class="sub">${sub}</div>
      </div>
      ${statusHtml}
    </div>
  `;
}

// ────────────────────────────────────────────────────────────
// 화면 3: Calendar
// ────────────────────────────────────────────────────────────
async function openCalendar(staffId, staffName) {
  selectedStaff = { id: staffId, name: staffName };
  currentScreen = SCREEN_CALENDAR;
  staffDetail = null;  // 로딩 상태
  render();
  try {
    const r = await apiGet("getStaffDetail", { employeeId: staffId, anchor: currentAnchor });
    if (r && r.ok && r.data) {
      staffDetail = r.data;
    } else {
      showToast(t("toast.action_failed", { msg: (r && r.error && (LANG === "ko" ? r.error.message_ko : r.error.message_en)) || "?" }));
    }
  } catch (err) {
    showToast(t("toast.action_failed", { msg: err.message || err }));
  }
  render();
}

function renderCalendar_(user) {
  if (!selectedStaff) return `<div class="card"><p class="hint">${t("search.no_results")}</p></div>`;
  const isAdmin = !!user.isAdmin;
  const dayStates = (staffDetail && staffDetail.dayStates) || {};
  const empCategory = staffDetail && staffDetail.employee ? staffDetail.employee.category : "";
  const empShift = staffDetail && staffDetail.employee ? staffDetail.employee.defaultShift : "";

  // 28일 셀 생성 (anchor 월요일부터)
  const anchorIso = (staffDetail && staffDetail.anchor) || currentAnchor;
  const today = todayIso();
  const days = [];
  for (let i = 0; i < 28; i++) {
    const iso = fmtDate(addDays(parseDate(anchorIso), i));
    const cell = dayStates[iso];
    days.push({
      iso: iso, day: parseDate(iso).getDate(),
      state: cell ? cell.state : "work",
      pinned: cell ? cell.pinned : false,
      isToday: iso === today
    });
  }

  // 요일 헤더 (월요일 시작 가정)
  const dowKeys = ["calendar.mon","calendar.tue","calendar.wed","calendar.thu","calendar.fri","calendar.sat","calendar.sun"];
  const dowHeader = dowKeys.map((k, i) => `<div class="head ${i===5?"sat":i===6?"sun":""}">${t(k)}</div>`).join("");

  const cells = days.map((d, i) => {
    const dow = i % 7;
    const cls = ["day-cell"];
    if (d.state === "vacation") cls.push("vac");
    else if (d.state === "dayoff") cls.push("off");
    else if (d.state === "pre_practice") cls.push("pre");
    else if (d.state === "special") cls.push("spl");
    if (d.isToday) cls.push("today");
    if (!isAdmin) cls.push("viewer");
    const lblText = d.state === "vacation" ? t("state.vacation.short")
                  : d.state === "dayoff" ? t("state.dayoff.short")
                  : d.state === "pre_practice" ? t("state.pre_practice.short")
                  : d.state === "special" ? t("state.special.short") : "";
    return `<div class="${cls.join(" ")}" data-cell-date="${d.iso}" data-cell-state="${d.state}"><span class="d">${d.day}</span>${lblText?`<span class="lbl">${lblText}</span>`:""}</div>`;
  }).join("");

  const vacForm = isAdmin ? `
    <div class="card">
      <h2>${t("calendar.set_vacation_range")}</h2>
      <div class="vacation-form">
        <div><label>${t("calendar.from")}</label><input type="date" id="vac-from" value="${anchorIso}"></div>
        <div><label>${t("calendar.to")}</label><input type="date" id="vac-to" value="${fmtDate(addDays(parseDate(anchorIso), 4))}"></div>
        <div class="apply-row">
          <button class="btn" id="vac-apply">${t("calendar.apply_vacation")}</button>
        </div>
      </div>
      <p class="hint" style="margin-top:8px;">${t("calendar.cell_help")}</p>
    </div>
  ` : `
    <div class="card"><p class="hint">${t("calendar.viewer_locked")}</p></div>
  `;

  const loadingHtml = !staffDetail ? `<div class="card"><p class="hint">${t("common.loading")}</p></div>` : "";

  return `
    <div class="card">
      <h2>${escapeHtml(selectedStaff.name)}</h2>
      <p class="hint">${escapeHtml(empCategory)} · ${empShift ? escapeHtml(t("shift." + empShift + ".full")) : ""}</p>
    </div>
    ${loadingHtml}
    ${staffDetail ? `
      <div class="card">
        <div class="anchor-nav" style="margin-bottom:8px;">
          <button class="ghost" data-anchor-delta="-28">${t("common.prev_4w")}</button>
          <span class="range">${escapeHtml(rangeLabel(anchorIso))}</span>
          <button class="ghost" data-anchor-delta="0">${t("common.today")}</button>
          <button class="ghost" data-anchor-delta="28">${t("common.next_4w")}</button>
        </div>
        <div class="calendar">${dowHeader}${cells}</div>
      </div>
      ${vacForm}
    ` : ""}
  `;
}

// 셀 토글 (admin)
async function toggleCell(date, currentState) {
  const order = ["work","vacation","dayoff","pre_practice","special"];
  const idx = order.indexOf(currentState);
  const next = order[(idx + 1) % order.length];
  // 낙관적 업데이트
  if (staffDetail && staffDetail.dayStates) {
    if (next === "work") delete staffDetail.dayStates[date];
    else staffDetail.dayStates[date] = { state: next, pinned: true, note: "" };
  }
  render();
  try {
    const r = await apiPost("setCellState", {
      date: date, employeeId: selectedStaff.id, state: next, pinned: next !== "work"
    });
    if (!r || !r.ok) {
      showToast(t("toast.action_failed", { msg: (r && r.error && (LANG === "ko" ? r.error.message_ko : r.error.message_en)) || "?" }));
      // 롤백
      if (staffDetail && staffDetail.dayStates) {
        if (currentState === "work") delete staffDetail.dayStates[date];
        else staffDetail.dayStates[date] = { state: currentState, pinned: true, note: "" };
      }
      render();
    }
  } catch (err) {
    showToast(t("toast.action_failed", { msg: err.message || err }));
  }
}

// 휴가 범위 적용
async function applyVacationRange() {
  const from = document.getElementById("vac-from").value;
  const to = document.getElementById("vac-to").value;
  if (!from || !to) return;
  if (from > to) { showToast(t("toast.from_after_to")); return; }
  try {
    const r = await apiPost("applyVacationRange", {
      employeeId: selectedStaff.id, startDate: from, endDate: to
    });
    if (r && r.ok && r.data) {
      const aff = (r.data.affectedDates || []).length;
      const skip = (r.data.skippedDates || []).length;
      // 캘린더에 반영
      (r.data.affectedDates || []).forEach(d => {
        if (!staffDetail) staffDetail = { dayStates: {} };
        if (!staffDetail.dayStates) staffDetail.dayStates = {};
        staffDetail.dayStates[d] = { state: "vacation", pinned: false, note: "" };
      });
      render();
      let msg = t("toast.vacation_applied", { n: aff });
      if (skip > 0) msg += " · " + t("toast.vacation_pinned_skipped", { n: skip });
      showToast(msg, 3200);
    } else {
      showToast(t("toast.action_failed", { msg: (r && r.error && (LANG === "ko" ? r.error.message_ko : r.error.message_en)) || "?" }));
    }
  } catch (err) {
    showToast(t("toast.action_failed", { msg: err.message || err }));
  }
}

// ────────────────────────────────────────────────────────────
// 부팅 + 이벤트
// ────────────────────────────────────────────────────────────
async function boot() {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }
  setLang(detectInitialLang());
  document.getElementById("loading-text").textContent = t("common.loading");
  try {
    const r = await apiGet("ping");
    if (!r || !r.ok) {
      const code = (r && r.error && r.error.code) || "INTERNAL";
      const msg = (r && r.error && (LANG === "ko" ? r.error.message_ko : r.error.message_en)) || t("error.internal");
      showAuthError(code, msg); return;
    }
    let saved = null;
    try { saved = localStorage.getItem("scheduleApp.lang"); } catch (e) {}
    if (!saved && r.lang) setLang(r.lang);
    bootData = r.data;
    loadPersistedState(bootData.user);
    currentScreen = SCREEN_HOME;
    render();
    bindEvents();
  } catch (err) {
    if (err && err.name === "AbortError") showAuthError("TIMEOUT", t("error.network") + " (timeout)");
    else showAuthError("NETWORK", t("error.network") + " — " + (err && err.message ? err.message : err));
  }
}

function bindEvents() {
  const toggle = document.getElementById("lang-toggle");
  if (!toggle.dataset.bound) {
    toggle.addEventListener("click", () => { setLang(LANG === "en" ? "ko" : "en"); render(); });
    toggle.dataset.bound = "1";
  }
  const back = document.getElementById("back-btn");
  if (!back.dataset.bound) {
    back.addEventListener("click", () => {
      if (currentScreen === SCREEN_CALENDAR) {
        currentScreen = SCREEN_FIND_DEALER;
        selectedStaff = null; staffDetail = null;
      } else { currentScreen = SCREEN_HOME; }
      render();
    });
    back.dataset.bound = "1";
  }
  const mainEl = document.getElementById("main");
  if (!mainEl.dataset.bound) {
    mainEl.addEventListener("click", async (e) => {
      // Quick Action 네비
      const navBtn = e.target.closest("[data-nav]");
      if (navBtn) { navigate(navBtn.dataset.nav); return; }
      // 시프트 탭
      const shiftBtn = e.target.closest("[data-shift]");
      if (shiftBtn) { setShift(shiftBtn.dataset.shift); return; }
      // 4주 anchor
      const anchorBtn = e.target.closest("[data-anchor-delta]");
      if (anchorBtn) {
        const delta = parseInt(anchorBtn.dataset.anchorDelta, 10);
        if (currentScreen === SCREEN_CALENDAR && staffDetail) {
          if (delta === 0) currentAnchor = mondayOfThisWeek();
          else currentAnchor = fmtDate(addDays(parseDate(staffDetail.anchor || currentAnchor), delta));
          try { localStorage.setItem("scheduleApp.anchor", currentAnchor); } catch (e) {}
          // 캘린더 데이터 다시 fetch
          openCalendar(selectedStaff.id, selectedStaff.name);
        } else {
          moveAnchor(delta);
        }
        return;
      }
      // staff card
      const card = e.target.closest("[data-staff-id]");
      if (card) {
        openCalendar(card.dataset.staffId, card.dataset.staffName);
        return;
      }
      // calendar cell (admin only — toggle)
      const cell = e.target.closest("[data-cell-date]");
      if (cell) {
        const isAdmin = bootData && bootData.user && bootData.user.isAdmin;
        if (!isAdmin) return;
        toggleCell(cell.dataset.cellDate, cell.dataset.cellState);
        return;
      }
      // vacation apply
      if (e.target.id === "vac-apply") { applyVacationRange(); return; }
    });
    mainEl.dataset.bound = "1";
  }
}

function showAuthError(code, message) {
  let icon = "⚠️", title = message, sub = "";
  const tg = window.Telegram && window.Telegram.WebApp;
  const dbg = tg ? { hasTg: true, initDataLen: tg.initData ? tg.initData.length : 0, userId: (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || "(none)", platform: tg.platform || "(none)" } : { hasTg: false };
  if (code === "USER_NOT_REGISTERED") { icon = "🔒"; title = t("error.not_registered"); }
  else if (code === "AUTH_MISSING" || code === "AUTH_INVALID" || code === "AUTH_EXPIRED") {
    icon = "🔐"; title = (code === "AUTH_MISSING") ? t("error.auth_missing") : (code === "AUTH_INVALID") ? t("error.auth_invalid") : t("error.auth_expired");
    sub = "DEBUG: " + JSON.stringify(dbg);
  } else if (code === "NETWORK" || code === "TIMEOUT") { icon = "📡"; title = t("error.network"); sub = message; }
  else { icon = "❌"; title = message || t("error.internal"); }
  const loading = document.getElementById("loading");
  loading.innerHTML = `<div class="icon">${icon}</div><h2>${escapeHtml(title)}</h2>${sub ? `<pre>${escapeHtml(sub)}</pre>` : ""}<button class="btn" onclick="location.reload()">${escapeHtml(t("common.refresh"))}</button>`;
  loading.style.display = "flex";
  document.getElementById("app").style.display = "none";
}

document.addEventListener("DOMContentLoaded", boot);
</script>
