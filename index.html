<!DOCTYPE html>

<!-- 7단계: 화면 5 본인 화면 (Today's Breaks + 본인 4주 캘린더 read-only) (2026-05-25) -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1f2328);
    --hint: var(--tg-theme-hint-color, #6e7781);
    --link: var(--tg-theme-link-color, #2481cc);
    --btn: var(--tg-theme-button-color, #2481cc);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --bg-sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
    --vac: #A8D5FF; --off: #FFE680; --pre: #FFC58A; --spl: #D8B4FE;
    --triple: #c8e6c9; --pair: #ffe0b2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; overflow-x: hidden; }
  .app-header { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--bg-sec); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .app-header .left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .app-header h1 { margin: 0; font-size: 17px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .back-btn { background: var(--bg-sec); border: none; color: var(--text); padding: 5px 10px; border-radius: 14px; font-size: 13px; cursor: pointer; }
  .lang-toggle { background: var(--bg-sec); border: none; color: var(--text); padding: 5px 10px; border-radius: 14px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .lang-toggle .active { font-weight: 700; color: var(--btn); }
  /* REFRESH-1 (2026-05-26): 헤더 ↻ 새로고침 버튼 */
  .refresh-btn { background: var(--bg-sec); border: none; color: var(--text); padding: 5px 9px; border-radius: 14px; font-size: 15px; cursor: pointer; line-height: 1; transition: transform 0.4s ease; }
  .refresh-btn:active { transform: rotate(180deg); }
  .refresh-btn.spinning { animation: refresh-spin 0.6s ease; }
  @keyframes refresh-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .header-actions { display: flex; align-items: center; gap: 6px; }
  main { padding: 14px; max-width: 720px; margin: 0 auto; }
  .card { background: var(--bg-sec); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .card h2 { margin: 0 0 8px; font-size: 15px; font-weight: 600; }
  .card .hint { color: var(--hint); font-size: 13px; margin: 4px 0; }
  .btn { display: inline-block; background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
  .btn.ghost { background: var(--bg-sec); color: var(--text); border: 1px solid var(--hint); }
  .btn.small { padding: 6px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-row .btn { padding: 14px 10px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .btn-row .btn .emo { font-size: 22px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; }
  .legend-item { display: inline-flex; align-items: center; gap: 4px; }
  .swatch { width: 16px; height: 16px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.15); display: inline-block; }
  .fullscreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; text-align: center; z-index: 100; }
  .fullscreen .icon { font-size: 56px; margin-bottom: 16px; }
  .fullscreen h2 { margin: 0 0 8px; font-size: 18px; }
  .fullscreen p { color: var(--hint); margin: 4px 0; font-size: 13px; max-width: 90%; }
  .fullscreen pre { color: var(--hint); font-size: 10px; text-align: left; background: var(--bg-sec); padding: 8px; border-radius: 6px; max-width: 100%; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  .fullscreen .btn { margin-top: 18px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--bg-sec); border-top-color: var(--btn); border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .meta-grid { display: grid; grid-template-columns: max-content 1fr; gap: 4px 12px; font-size: 12px; }
  .meta-grid dt { color: var(--hint); }
  .meta-grid dd { margin: 0; word-break: break-all; }
  .placeholder-icon { font-size: 48px; text-align: center; margin: 10px 0; }
  .shift-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .shift-tab { background: var(--bg-sec); color: var(--text); border: 1px solid transparent; padding: 10px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; line-height: 1.2; }
  .shift-tab .sub { display: block; color: var(--hint); font-size: 10px; font-weight: 400; margin-top: 2px; }
  .shift-tab.active { background: var(--btn); color: var(--btn-text); border-color: var(--btn); }
  .shift-tab.active .sub { color: var(--btn-text); opacity: 0.85; }
  .anchor-nav { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-top: 10px; }
  .anchor-nav .ghost { background: var(--bg-sec); color: var(--text); border: 1px solid transparent; padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .anchor-nav .range { font-size: 12px; color: var(--hint); flex: 1; text-align: center; min-width: 0; }
  .search-bar { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--hint); background: var(--bg); color: var(--text); font-size: 14px; }
  .filter-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .filter-row select { flex: 1; min-width: 90px; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--hint); background: var(--bg); color: var(--text); font-size: 13px; }
  .result-count { font-size: 12px; color: var(--hint); margin: 8px 0; }
  .staff-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; background: var(--bg-sec); margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; }
  .staff-card:active { border-color: var(--btn); }
  .staff-card .avatar { font-size: 22px; }
  .staff-card .body { flex: 1; min-width: 0; }
  .staff-card .name { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .staff-card .sub { font-size: 11px; color: var(--hint); }
  .staff-card .status { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--bg); }
  .staff-card .status.vac { background: var(--vac); color: #1a3a5a; }
  .staff-card .status.off { background: var(--off); color: #5a4500; }
  .staff-card .status.pre { background: var(--pre); color: #6a3a00; }
  .staff-card .status.spl { background: var(--spl); color: #4a2a6a; }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin: 8px 0; }
  .calendar .head { font-size: 11px; color: var(--hint); text-align: center; padding: 4px 0; font-weight: 600; }
  .calendar .head.sun { color: #d94545; }
  .calendar .head.sat { color: #3b6ec7; }
  .day-cell { aspect-ratio: 1; border-radius: 6px; background: var(--bg); border: 1px solid var(--bg-sec); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; line-height: 1.1; padding: 2px; }
  .day-cell.today { outline: 2px solid var(--btn); }
  .day-cell.viewer { cursor: default; }
  .day-cell .d { font-size: 12px; font-weight: 600; }
  .day-cell .lbl { font-size: 9px; font-weight: 700; margin-top: 1px; }
  .day-cell.vac { background: var(--vac); color: #1a3a5a; }
  .day-cell.off { background: var(--off); color: #5a4500; }
  .day-cell.pre { background: var(--pre); color: #6a3a00; }
  .day-cell.spl { background: var(--spl); color: #4a2a6a; }
  /* BATCH-1 (2026-05-26): 미적용 변경 시각 표시 — 점선 흰 테두리 */
  .day-cell.pending { outline: 2px dashed #ffffff; outline-offset: -3px; box-shadow: 0 0 0 1px rgba(0,0,0,0.4) inset; }
  /* Apply 버튼 — Pending 개수 배지 */
  .apply-btn { background: var(--btn); border: none; color: #fff; padding: 5px 11px; border-radius: 14px; font-size: 13px; font-weight: 700; cursor: pointer; display: none; align-items: center; gap: 4px; }
  .apply-btn.visible { display: inline-flex; }
  .apply-btn:disabled { opacity: 0.6; cursor: wait; }
  .apply-btn .count { background: rgba(255,255,255,0.25); border-radius: 10px; padding: 1px 6px; font-size: 11px; }
  .vacation-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: end; margin-top: 6px; }
  .vacation-form label { font-size: 12px; color: var(--hint); display: block; }
  .vacation-form input[type=date] { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--hint); background: var(--bg); color: var(--text); font-size: 13px; }
  .vacation-form .apply-row { grid-column: 1 / -1; display: flex; gap: 8px; }
  .vacation-form .apply-row .btn { flex: 1; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 18px; border-radius: 18px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.25s; pointer-events: none; max-width: 90%; text-align: center; }
  .toast.show { opacity: 1; }
  .breaks-summary { font-size: 12px; color: var(--hint); margin-bottom: 8px; }
  .breaks-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .break-group { background: var(--bg); border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 4px solid var(--triple); }
  .break-group.pair { border-left-color: var(--pair); }
  .break-group .gh { font-size: 12px; color: var(--hint); margin-bottom: 6px; font-weight: 600; }
  .break-slots { display: grid; gap: 4px; }
  .break-slots .row { display: flex; gap: 8px; align-items: center; font-size: 13px; }
  .break-slots .row .time { font-family: monospace; font-weight: 700; color: var(--btn); min-width: 50px; }
  .break-slots .row .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* REQ-3 (2026-05-26): 테이블 칩 */
  .table-chip { display: inline-block; background: var(--bg-sec); border-radius: 8px; padding: 1px 6px; font-size: 11px; font-weight: 600; color: var(--text); margin-left: 4px; opacity: 0.9; }
  .hours-strip { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .hour-chip { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-family: monospace; background: var(--bg-sec); color: var(--text); cursor: pointer; }
  .hour-chip.active { background: var(--btn); color: var(--btn-text); font-weight: 700; }
  .super-card { background: var(--bg); border-radius: 8px; padding: 10px; margin-bottom: 6px; }
  .super-card .sn { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .super-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .super-chip { background: var(--bg-sec); padding: 4px 8px; border-radius: 12px; font-size: 11px; display: inline-flex; gap: 6px; align-items: center; }
  .super-chip .del { color: #c74040; cursor: pointer; font-weight: 700; }
  .super-add { display: flex; gap: 4px; margin-top: 6px; align-items: center; }
  .super-add input { padding: 5px 7px; border: 1px solid var(--hint); border-radius: 5px; background: var(--bg); color: var(--text); font-size: 12px; min-width: 0; }
  .super-add input[type=time] { width: 80px; flex-shrink: 0; }
  .super-add input[type=number] { width: 56px; flex-shrink: 0; }
  .super-add button { padding: 5px 9px; background: var(--btn); color: var(--btn-text); border: none; border-radius: 5px; font-size: 11px; cursor: pointer; flex-shrink: 0; }
  .lock-pill { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .lock-pill.locked { background: #ffe0b2; color: #b07000; }
  .lock-pill.unlocked { background: #c8e6c9; color: #1a7f37; }

  /* 8단계: Staff Management */
  .staff-mgmt-card { background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; border: 1px solid var(--bg-sec); }
  .staff-mgmt-card.inactive { opacity: 0.6; }
  .staff-mgmt-card .top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .staff-mgmt-card .nm { font-weight: 600; font-size: 14px; }
  .staff-mgmt-card .meta { color: var(--hint); font-size: 11px; margin-top: 2px; }
  .staff-mgmt-card .actions { display: flex; gap: 4px; margin-top: 8px; }
  .staff-mgmt-card .actions .btn { padding: 5px 9px; font-size: 11px; }
  .staff-mgmt-card .edit-form { display: grid; gap: 6px; margin-top: 8px; }
  .staff-mgmt-card .edit-form input, .staff-mgmt-card .edit-form select { padding: 6px 8px; border-radius: 5px; border: 1px solid var(--hint); background: var(--bg); color: var(--text); font-size: 12px; width: 100%; }
  .staff-mgmt-card .edit-form label { font-size: 11px; color: var(--hint); display: block; margin-bottom: 2px; }
  .staff-mgmt-card .edit-form .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .staff-mgmt-card .edit-form .actions { margin-top: 8px; }
  .add-form-card { background: var(--bg); border-radius: 8px; padding: 12px; border: 2px dashed var(--btn); }
  .add-form-card .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .add-form-card input, .add-form-card select { padding: 8px; border-radius: 6px; border: 1px solid var(--hint); background: var(--bg); color: var(--text); font-size: 13px; width: 100%; }
  .add-form-card label { font-size: 11px; color: var(--hint); display: block; margin-bottom: 2px; }
  .badge-active { background: #c8e6c9; color: #1a7f37; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; }
  .badge-inactive { background: #ffcdd2; color: #c62828; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; }

  /* 7단계: 본인 화면 */
  .my-breaks-list { display: grid; gap: 6px; margin-top: 8px; }
  .my-break-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg); border-radius: 8px; border-left: 4px solid var(--btn); }
  .my-break-row.first { border-left-color: #1a7f37; }
  .my-break-row .clock { font-size: 18px; }
  .my-break-row .time { font-family: monospace; font-weight: 700; font-size: 16px; color: var(--btn); min-width: 70px; }
  .my-break-row .label { font-size: 11px; color: var(--hint); flex: 1; }
  .my-group-info { font-size: 12px; color: var(--hint); padding: 8px 0 0; }
  .my-group-info b { color: var(--text); }
</style>
</head>

function setLang(lang) {
  LANG = (lang === "ko") ? "ko" : "en";
  try { localStorage.setItem("scheduleApp.lang", LANG); } catch (e) {}
  document.documentElement.setAttribute("lang", LANG);
  document.querySelectorAll(".lang-toggle [data-lang]").forEach(el => el.classList.toggle("active", el.dataset.lang === LANG));
  // REFRESH-1: 새로고침 버튼 툴팁 i18n
  const rb = document.getElementById("refresh-btn");
  if (rb) { rb.title = t("common.refresh"); rb.setAttribute("aria-label", t("common.refresh")); }
}
function detectInitialLang() { try { const s = localStorage.getItem("scheduleApp.lang"); if (s === "en" || s === "ko") return s; } catch (e) {} const tg = window.Telegram && window.Telegram.WebApp; const c = tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code; return (c && String(c).toLowerCase().startsWith("ko")) ? "ko" : "en"; }
function t(key, vars) { const dict = I18N[LANG] || I18N.en; let s = dict[key]; if (s == null) { s = "[" + key + "]"; console.warn("[i18n] missing:", key, LANG); } if (vars) Object.keys(vars).forEach(k => s = s.replace(new RegExp("\\{" + k + "\\}", "g"), vars[k])); return s; }
function escapeHtml(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

function pad2(n) { return String(n).padStart(2, "0"); }
function fmtDate(d) { return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate()); }
function parseDate(iso) { const [y, m, d] = iso.split("-").map(Number); return new Date(y, m-1, d); }
function addDays(d, n) { const r = new Date(d.getFullYear(), d.getMonth(), d.getDate()); r.setDate(r.getDate() + n); return r; }
function mondayOfThisWeek() { const d = new Date(); d.setHours(0,0,0,0); const dow = d.getDay(); const off = (dow === 0) ? -6 : (1 - dow); return fmtDate(addDays(d, off)); }
function rangeLabel(anchorIso) { const s = parseDate(anchorIso); const e = addDays(s, 27); return fmtDate(s) + " ─ " + fmtDate(e); }
function todayIso() { return fmtDate(new Date()); }

async function fetchWithTimeout(url, ms, opts) {
  const c = new AbortController();
  const tid = setTimeout(() => c.abort(), ms);
  try { return await fetch(url, Object.assign({ signal: c.signal, redirect: "follow", mode: "cors", credentials: "omit" }, opts || {})); }
  finally { clearTimeout(tid); }
}

async function apiGet(action, extraParams) {
  const tg = window.Telegram && window.Telegram.WebApp;
  const initData = (tg && tg.initData) || "";
  const params = new URLSearchParams();
  params.set("action", action);
  if (initData) params.set("initData", initData);
  if (extraParams) Object.keys(extraParams).forEach(k => { if (extraParams[k] != null) params.set(k, String(extraParams[k])); });
  const sep = API_BASE.indexOf("?") >= 0 ? "&" : "?";
  const res = await fetchWithTimeout(API_BASE + sep + params.toString(), FETCH_TIMEOUT_MS, { method: "GET" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return await res.json();
}

async function apiPost(action, body) {
  const tg = window.Telegram && window.Telegram.WebApp;
  const initData = (tg && tg.initData) || "";
  const payload = Object.assign({ action: action, initData: initData }, body || {});
  const res = await fetchWithTimeout(API_BASE, FETCH_TIMEOUT_MS, {
    method: "POST", headers: { "Content-Type": "text/plain;charset=UTF-8" },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return await res.json();
}

// ────────────────────────────────────────────────────────────
// C-1(d) (2026-05-26): 클라이언트 메모리 캐시 — 60s TTL
// P2-2 (2026-05-26): Stale-while-revalidate — 만료된 캐시도 즉시 반환 + 백그라운드 fresh
// P2-3 (2026-05-26): localStorage 영속 — 세션 재시작해도 직전 데이터 즉시
// 쓰기 액션 발생 시 invalidateCache(prefix)로 명시 무효화.
// ────────────────────────────────────────────────────────────
// BUG-3 (2026-05-26): 공유 schedule 데이터에서 60s 캐시 + SWR이 시간차 유발 → TTL 단축.
// 같은 화면 재진입 캐시 hit 효과는 유지 (10초 이내 재진입은 즉시), 옛 데이터 잔류 최소화.
const READ_CACHE_TTL_MS = 10 * 1000;       // 신선도 기준 (10초 이내면 fresh, 백그라운드 fetch 안 함)
const READ_CACHE_MAX_AGE_MS = 10 * 60 * 1000;  // SWR/localStorage 최대 유효 (10분, 이후 강제 fresh)
const LS_CACHE_PREFIX = "scheduleApp.cache.v1.";
const LS_CACHE_MAX_KEYS = 30;  // 용량 제한
const readCache = new Map();  // key → { expires, value, fetchedAt }

function cacheKey_(action, paramsObj) {
  const keys = paramsObj ? Object.keys(paramsObj).sort() : [];
  const parts = keys.map(k => k + "=" + String(paramsObj[k]));
  return action + "?" + parts.join("&");
}

// P2-3: localStorage → 메모리 캐시 복원 (boot 시 1회)
function hydrateCacheFromStorage_() {
  try {
    const now = Date.now();
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || k.indexOf(LS_CACHE_PREFIX) !== 0) continue;
      const raw = localStorage.getItem(k);
      if (!raw) continue;
      const obj = JSON.parse(raw);
      if (!obj || !obj.value || !obj.fetchedAt) continue;
      if (now - obj.fetchedAt > READ_CACHE_MAX_AGE_MS) {
        try { localStorage.removeItem(k); } catch (e) {}
        continue;
      }
      readCache.set(k.substring(LS_CACHE_PREFIX.length), {
        expires: obj.fetchedAt + READ_CACHE_TTL_MS,
        value: obj.value,
        fetchedAt: obj.fetchedAt
      });
    }
  } catch (e) { /* localStorage 사용 불가 환경 — 무시 */ }
}

function persistCacheKey_(key, value) {
  try {
    const entry = { value: value, fetchedAt: Date.now() };
    localStorage.setItem(LS_CACHE_PREFIX + key, JSON.stringify(entry));
    // 용량 cap: 가장 오래된 키부터 제거
    const cacheKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.indexOf(LS_CACHE_PREFIX) === 0) cacheKeys.push(k);
    }
    if (cacheKeys.length > LS_CACHE_MAX_KEYS) {
      const items = cacheKeys.map(k => {
        try { const v = JSON.parse(localStorage.getItem(k) || "{}"); return { k, ts: v.fetchedAt || 0 }; }
        catch (e) { return { k, ts: 0 }; }
      });
      items.sort((a, b) => a.ts - b.ts);
      for (let i = 0; i < items.length - LS_CACHE_MAX_KEYS; i++) {
        try { localStorage.removeItem(items[i].k); } catch (e) {}
      }
    }
  } catch (e) { /* quota / private mode — 무시 */ }
}

// P2-2: SWR — 만료된 캐시도 즉시 반환 + 백그라운드 refresh
// onUpdate(freshValue): 백그라운드 응답이 도착해서 캐시가 갱신됐을 때 호출 (옵션)
async function apiGetCached(action, extraParams, opts) {
  opts = opts || {};
  const key = cacheKey_(action, extraParams);
  const now = Date.now();
  const hit = readCache.get(key);

  // 캐시 hit (fresh) → 즉시 반환, fetch 없음
  if (hit && hit.expires > now) return hit.value;

  // 캐시 hit (stale, 단 MAX_AGE 이내) → 즉시 반환 + 백그라운드 refresh
  if (hit && hit.fetchedAt && (now - hit.fetchedAt) < READ_CACHE_MAX_AGE_MS && !opts.forceFresh) {
    // 백그라운드 fetch
    apiGet(action, extraParams).then(r => {
      if (r && r.ok) {
        const entry = { expires: Date.now() + READ_CACHE_TTL_MS, value: r, fetchedAt: Date.now() };
        readCache.set(key, entry);
        persistCacheKey_(key, r);
        if (typeof opts.onUpdate === "function") {
          try { opts.onUpdate(r); } catch (e) {}
        }
      }
    }).catch(() => {});
    return hit.value;
  }

  // 캐시 없음 또는 너무 오래됨 → 동기 fetch
  const r = await apiGet(action, extraParams);
  if (r && r.ok) {
    const entry = { expires: now + READ_CACHE_TTL_MS, value: r, fetchedAt: now };
    readCache.set(key, entry);
    persistCacheKey_(key, r);
  }
  return r;
}

function invalidateCache(prefix) {
  if (!prefix) {
    readCache.clear();
    // localStorage도 같이
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf(LS_CACHE_PREFIX) === 0) keys.push(k);
      }
      keys.forEach(k => { try { localStorage.removeItem(k); } catch (e) {} });
    } catch (e) {}
    return;
  }
  for (const k of Array.from(readCache.keys())) {
    if (k.indexOf(prefix) === 0) {
      readCache.delete(k);
      try { localStorage.removeItem(LS_CACHE_PREFIX + k); } catch (e) {}
    }
  }
}

function navigate(screen) { currentScreen = screen; render(); }

function setShift(shift) {
  if (["M","A","N"].indexOf(shift) < 0) return;
  currentShift = shift;
  try { localStorage.setItem("scheduleApp.shift", shift); } catch (e) {}
  render();
}

function moveAnchor(days) {
  if (days === 0) currentAnchor = mondayOfThisWeek();
  else currentAnchor = fmtDate(addDays(parseDate(currentAnchor), days));
  try { localStorage.setItem("scheduleApp.anchor", currentAnchor); } catch (e) {}
  render();
}

function loadPersistedState(user) {
  try {
    const s = localStorage.getItem("scheduleApp.shift");
    if (["M","A","N"].indexOf(s) >= 0) currentShift = s;
    else if (user && user.defaultShift) currentShift = user.defaultShift;
  } catch (e) {}
  try {
    const a = localStorage.getItem("scheduleApp.anchor");
    if (a && /^\d{4}-\d{2}-\d{2}$/.test(a)) currentAnchor = a;
  } catch (e) {}
}

function render() {
  if (!bootData) return;
  const user = bootData.user || {};
  const isAdmin = !!user.isAdmin;

  const backBtn = document.getElementById("back-btn");
  const headerTitle = document.getElementById("header-title");
  let title = t("common.app_title");

  if (currentScreen === SCREEN_HOME) backBtn.style.display = "none";
  else if (currentScreen === SCREEN_MY && !isAdmin) backBtn.style.display = "none";  // viewer 기본 화면
  else backBtn.style.display = "inline-block";

  if (currentScreen === SCREEN_FIND_DEALER) title = t("home.find_dealer");
  else if (currentScreen === SCREEN_CALENDAR) title = selectedStaff ? selectedStaff.name : t("home.find_dealer");
  else if (currentScreen === SCREEN_BREAKS) title = t("breaks.title");
  else if (currentScreen === SCREEN_MY) title = t("my.title");
  else if (currentScreen === SCREEN_STAFF) title = t("staff.title");
  else if (currentScreen === SCREEN_CYCLE) title = t("cycle.title");
  else if (PLACEHOLDER_SCREENS[currentScreen]) title = t(PLACEHOLDER_SCREENS[currentScreen].titleKey);

  headerTitle.textContent = title;

  const main = document.getElementById("main");
  if (currentScreen === SCREEN_HOME) {
    main.innerHTML = isAdmin ? renderAdminHome_(user) : renderViewerHome_(user);
  } else if (currentScreen === SCREEN_FIND_DEALER) {
    main.innerHTML = renderFindDealer_();
    bindSearchInput();
    triggerSearch();
  } else if (currentScreen === SCREEN_CALENDAR) {
    main.innerHTML = renderCalendar_(user);
  } else if (currentScreen === SCREEN_BREAKS) {
    main.innerHTML = renderBreaks_(user);
  } else if (currentScreen === SCREEN_MY) {
    main.innerHTML = renderMy_(user);
  } else if (currentScreen === SCREEN_STAFF) {
    main.innerHTML = renderStaff_(user);
  } else if (currentScreen === SCREEN_CYCLE) {
    main.innerHTML = renderCycle_(user);
  } else if (PLACEHOLDER_SCREENS[currentScreen]) {
    main.innerHTML = renderPlaceholder_(currentScreen);
  } else {
    main.innerHTML = renderAdminHome_(user);
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";

  // BATCH-1: 화면 전환 시 Apply 버튼 표시/숨김 갱신
  updateApplyButton_();
}

function bindSearchInput() {
  const q = document.getElementById("search-q");
  if (q) q.addEventListener("input", (e) => { searchQuery = e.target.value; if (searchDebounceTid) clearTimeout(searchDebounceTid); searchDebounceTid = setTimeout(() => triggerSearch(), 300); });
  ["filter-shift","filter-category","filter-active"].forEach(id => {
    const sel = document.getElementById(id); if (!sel) return;
    sel.value = searchFilters[id.replace("filter-","")];
    sel.addEventListener("change", (e) => { searchFilters[id.replace("filter-","")] = e.target.value; triggerSearch(); });
  });
}

async function triggerSearch() {
  searchLoading = true; updateSearchUI_();
  const _params = { q: searchQuery, shift: searchFilters.shift, category: searchFilters.category, active: searchFilters.active, limit: 50, offset: 0 };
  try {
    // C-1(d) 캐시 + P2-2 SWR: stale 캐시 즉시 반환 + 백그라운드 갱신 시 자동 UI 새로고침
    const r = await apiGetCached("searchStaff", _params, {
      onUpdate: (fresh) => {
        // 사용자가 같은 검색어 상태에 있을 때만 갱신
        if (cacheKey_("searchStaff", _params) === cacheKey_("searchStaff", { q: searchQuery, shift: searchFilters.shift, category: searchFilters.category, active: searchFilters.active, limit: 50, offset: 0 })) {
          if (fresh.data) { searchResults = fresh.data.items || []; searchTotal = fresh.data.total || 0; updateSearchUI_(); }
        }
      }
    });
    if (r && r.ok && r.data) { searchResults = r.data.items || []; searchTotal = r.data.total || 0; }
    else { searchResults = []; searchTotal = 0; showToast(t("toast.action_failed", { msg: (r && r.error && (LANG === "ko" ? r.error.message_ko : r.error.message_en)) || "?" })); }
  } catch (err) { searchResults = []; searchTotal = 0; showToast(t("toast.action_failed", { msg: err.message || err })); }
  finally { searchLoading = false; updateSearchUI_(); }
}

function updateSearchUI_() {
  const rc = document.getElementById("result-count");
  if (rc) rc.textContent = searchLoading ? t("common.loading") : (searchResults.length === 0 ? t("search.no_results") : t("search.showing", { n: searchResults.length, total: searchTotal }));
  const r = document.getElementById("search-results");
  if (r) {
    if (searchResults.length === 0 && !searchLoading) r.innerHTML = `<p class="hint" style="text-align:center;">${t("search.no_results")}</p>`;
    else r.innerHTML = searchResults.map(s => renderStaffCard_(s)).join("");
  }
}

function renderStaffCard_(s) {
  const name = (LANG === "ko" && s.name_ko) ? s.name_ko : (s.name_en || s.id);
  // REQ-2/REQ-3: 국적 + 테이블 부제에 추가
  const extras = [];
  if (s.nationality) extras.push(escapeHtml(s.nationality));
  if (s.defaultTable) extras.push(escapeHtml(s.defaultTable));
  const sub = (s.category === "dealer" ? "🃏" : "🎯") + " " + escapeHtml(s.category) + " · " + escapeHtml(t("shift." + s.defaultShift + ".full")) + (extras.length ? " · " + extras.join(" · ") : "");
  let statusHtml;
  if (s.todayState === "vacation") statusHtml = `<span class="status vac">${t("state.vacation.short")}</span>`;
  else if (s.todayState === "dayoff") statusHtml = `<span class="status off">${t("state.dayoff.short")}</span>`;
  else if (s.todayState === "pre_practice") statusHtml = `<span class="status pre">${t("state.pre_practice.short")}</span>`;
  else if (s.todayState === "special") statusHtml = `<span class="status spl">${t("state.special.short")}</span>`;
  else statusHtml = `<span class="status">${t("search.status_working")}</span>`;
  return `<div class="staff-card" data-staff-id="${escapeHtml(s.id)}" data-staff-name="${escapeHtml(name)}"><div class="avatar">👤</div><div class="body"><div class="name">${escapeHtml(name)}</div><div class="sub">${sub}</div></div>${statusHtml}</div>`;
}

async function openCalendar(staffId, staffName) {
  // BATCH-1: 다른 직원으로 이동 시 미적용 변경 폐기 확인
  if (selectedStaff && selectedStaff.id !== staffId && Object.keys(pendingCellChanges).length > 0) {
    if (!confirm(t("calendar.discard_pending_confirm", { n: Object.keys(pendingCellChanges).length }))) return;
  }
  pendingCellChanges = {};
  selectedStaff = { id: staffId, name: staffName };
  currentScreen = SCREEN_CALENDAR; staffDetail = null; render();
  updateApplyButton_();
  try {
    // BUG-3 (2026-05-26): 캘린더 진입은 명시 액션 → 강제 fresh (옛 셀 상태 잔류 방지)
    const r = await apiGetCached("getStaffDetail", { employeeId: staffId, anchor: currentAnchor }, {
      forceFresh: true,
      onUpdate: (fresh) => {
        if (selectedStaff && selectedStaff.id === staffId && currentScreen === SCREEN_CALENDAR) {
          if (fresh.data) { staffDetail = fresh.data; render(); }
        }
      }
    });
    if (r && r.ok && r.data) staffDetail = r.data;
    else showToast(t("toast.action_failed", { msg: (r && r.error && (LANG === "ko" ? r.error.message_ko : r.error.message_en)) || "?" }));
  } catch (err) { showToast(t("toast.action_failed", { msg: err.message || err })); }
  render();
}

function renderCalendar_(user) {
  if (!selectedStaff) return `<div class="card"><p class="hint">${t("search.no_results")}</p></div>`;
  const isAdmin = !!user.isAdmin;
  const dayStates = (staffDetail && staffDetail.dayStates) || {};
  const empCategory = staffDetail && staffDetail.employee ? staffDetail.employee.category : "";
  const empShift = staffDetail && staffDetail.employee ? staffDetail.employee.defaultShift : "";
  const anchorIso = (staffDetail && staffDetail.anchor) || currentAnchor;
  const today = todayIso();
  const days = [];
  for (let i = 0; i < 28; i++) {
    const iso = fmtDate(addDays(parseDate(anchorIso), i));
    const cell = dayStates[iso];
    const serverState = cell ? cell.state : "work";
    // BATCH-1: pending이 있으면 그것을 우선 표시
    const hasPending = Object.prototype.hasOwnProperty.call(pendingCellChanges, iso);
    const effectiveState = hasPending ? pendingCellChanges[iso] : serverState;
    days.push({
      iso,
      day: parseDate(iso).getDate(),
      state: effectiveState,
      pinned: cell ? cell.pinned : false,
      pending: hasPending && effectiveState !== serverState,
      isToday: iso === today
    });
  }
  const dowKeys = ["calendar.mon","calendar.tue","calendar.wed","calendar.thu","calendar.fri","calendar.sat","calendar.sun"];
  const dowHeader = dowKeys.map((k, i) => `<div class="head ${i===5?"sat":i===6?"sun":""}">${t(k)}</div>`).join("");
  const cells = days.map(d => {
    const cls = ["day-cell"];
    if (d.state === "vacation") cls.push("vac");
    else if (d.state === "dayoff") cls.push("off");
    else if (d.state === "pre_practice") cls.push("pre");
    else if (d.state === "special") cls.push("spl");
    if (d.isToday) cls.push("today");
    if (!isAdmin) cls.push("viewer");
    if (d.pending) cls.push("pending");  // BATCH-1: 미적용 변경 시각 표시
    const lblText = d.state === "vacation" ? t("state.vacation.short") : d.state === "dayoff" ? t("state.dayoff.short") : d.state === "pre_practice" ? t("state.pre_practice.short") : d.state === "special" ? t("state.special.short") : "";
    return `<div class="${cls.join(" ")}" data-cell-date="${d.iso}" data-cell-state="${d.state}"><span class="d">${d.day}</span>${lblText?`<span class="lbl">${lblText}</span>`:""}</div>`;
  }).join("");
  const vacForm = isAdmin ? `<div class="card"><h2>${t("calendar.set_vacation_range")}</h2>
    <div class="vacation-form">
      <div><label>${t("calendar.from")}</label><input type="date" id="vac-from" value="${anchorIso}"></div>
      <div><label>${t("calendar.to")}</label><input type="date" id="vac-to" value="${fmtDate(addDays(parseDate(anchorIso), 4))}"></div>
      <div class="apply-row"><button class="btn" id="vac-apply">${t("calendar.apply_vacation")}</button></div>
    </div>
    <p class="hint" style="margin-top:8px;">${t("calendar.cell_help")}</p>
    ${Object.keys(pendingCellChanges).length > 0 ? `<p class="hint" style="margin-top:6px; color: var(--btn); font-weight: 600;">${escapeHtml(t("calendar.pending_hint", { n: Object.keys(pendingCellChanges).length }))}</p>` : ""}
    </div>` : `<div class="card"><p class="hint">${t("calendar.viewer_locked")}</p></div>`;
  const loadingHtml = !staffDetail ? `<div class="card"><p class="hint">${t("common.loading")}</p></div>` : "";
  return `<div class="card"><h2>${escapeHtml(selectedStaff.name)}</h2><p class="hint">${escapeHtml(empCategory)} · ${empShift ? escapeHtml(t("shift." + empShift + ".full")) : ""}</p></div>${loadingHtml}${staffDetail ? `<div class="card"><div class="anchor-nav" style="margin-bottom:8px;"><button class="ghost" data-anchor-delta="-28">${t("common.prev_4w")}</button><span class="range">${escapeHtml(rangeLabel(anchorIso))}</span><button class="ghost" data-anchor-delta="0">${t("common.today")}</button><button class="ghost" data-anchor-delta="28">${t("common.next_4w")}</button></div><div class="calendar">${dowHeader}${cells}</div></div>${vacForm}` : ""}`;
}

// BATCH-1 (2026-05-26): 셀 클릭 = 즉시 저장 X, pendingCellChanges에만 누적.
// 헤더 ✓ 버튼 누르면 applyPendingChanges()가 일괄 setCellState 호출.
function toggleCell(date, currentVisualState) {
  if (applyingPending) return;  // 적용 중에는 클릭 무시
  // REQ-4 (2026-05-26): 순서 — work → dayoff → vacation → pre_practice → special → work
  const order = ["work","dayoff","vacation","pre_practice","special"];
  const next = order[(order.indexOf(currentVisualState) + 1) % order.length];

  // 서버 원본 상태 조회
  const cell = (staffDetail && staffDetail.dayStates) ? staffDetail.dayStates[date] : null;
  const serverState = cell ? cell.state : "work";

  if (next === serverState) {
    // pending → 원복 (서버 상태와 같으니 키 제거)
    delete pendingCellChanges[date];
  } else {
    pendingCellChanges[date] = next;
  }
  render();
  updateApplyButton_();
}

function updateApplyButton_() {
  const btn = document.getElementById("apply-btn");
  const cnt = document.getElementById("apply-count");
  if (!btn || !cnt) return;
  const n = Object.keys(pendingCellChanges).length;
  cnt.textContent = String(n);
  // 캘린더 화면 + admin + pending 있을 때만 표시
  const show = (currentScreen === SCREEN_CALENDAR) && bootData && bootData.user && bootData.user.isAdmin && n > 0;
  btn.classList.toggle("visible", show);
  btn.disabled = applyingPending;
}

// OVERRIDE-1 (2026-05-26): 4주 atomic overwrite.
// 관리자가 화면에서 보는 4주 전체(staffDetail.dayStates + pendingCellChanges 머지)를
// 서버에 통째로 덮어씌움. 1 round-trip. 옛 row + 외부 변경 모두 강제 정렬.
async function applyPendingChanges() {
  if (!selectedStaff) return;
  const pendingCount = Object.keys(pendingCellChanges).length;
  if (pendingCount === 0) { showToast(t("calendar.no_pending"), 1500); return; }

  applyingPending = true;
  updateApplyButton_();
  showToast(t("calendar.applying", { n: pendingCount }), 2000);

  // 4주 anchor 결정 — 서버가 알아본 anchor 우선
  const anchorIso = (staffDetail && staffDetail.anchor) || currentAnchor;
  const endIso = fmtDate(addDays(parseDate(anchorIso), 27));

  // 28일 effective state 산출 (admin이 지금 보는 그대로)
  const entries = [];
  for (let i = 0; i < 28; i++) {
    const iso = fmtDate(addDays(parseDate(anchorIso), i));
    const serverCell = (staffDetail && staffDetail.dayStates) ? staffDetail.dayStates[iso] : null;
    const serverState = serverCell ? serverCell.state : "work";
    const effective = Object.prototype.hasOwnProperty.call(pendingCellChanges, iso)
      ? pendingCellChanges[iso] : serverState;
    entries.push({
      date: iso,
      state: effective,
      pinned: effective !== "work"
    });
  }

  let success = false, errMsg = "";
  try {
    const r = await apiPost("setEmployeeSchedule", {
      employeeId: selectedStaff.id,
      startDate: anchorIso,
      endDate: endIso,
      entries: entries
    });
    if (r && r.ok) success = true;
    else errMsg = (r && r.error && (LANG === "ko" ? r.error.message_ko : r.error.message_en)) || "?";
  } catch (e) {
    errMsg = e && e.message ? e.message : String(e);
  }

  invalidateCache("searchStaff"); invalidateCache("getStaffDetail"); invalidateCache("getMyView"); invalidateCache("getBreaks");
  pendingCellChanges = {};
  applyingPending = false;

  // fresh fetch로 결과 확인
  try {
    const r2 = await apiGetCached("getStaffDetail", { employeeId: selectedStaff.id, anchor: anchorIso }, { forceFresh: true });
    if (r2 && r2.ok && r2.data) staffDetail = r2.data;
  } catch (e) {}

  render();
  updateApplyButton_();

  if (success) {
    showToast(t("calendar.applied_ok", { ok: pendingCount }), 3000);
  } else {
    showToast(t("toast.action_failed", { msg: errMsg }), 3500);
  }
}

function discardPendingChanges_() {
  pendingCellChanges = {};
  render();
  updateApplyButton_();
}

async function applyVacationRange() {
  const from = document.getElementById("vac-from").value;
  const to = document.getElementById("vac-to").value;
  if (!from || !to) return;
  if (from > to) { showToast(t("toast.from_after_to")); return; }
  try {
    const r = await apiPost("applyVacationRange", { employeeId: selectedStaff.id, startDate: from, endDate: to });
    // C-1(d): 휴가 적용은 검색/캘린더/본인/휴게 모두 영향
    invalidateCache("searchStaff"); invalidateCache("getStaffDetail"); invalidateCache("getMyView"); invalidateCache("getBreaks");

async function loadBreaks_(forceFresh) {
  breaksLoading = true; render();
  const _d = breaksDate, _s = breaksShift;

function renderBreaks_(user) {
  const isAdmin = !!user.isAdmin;
  if (breaksLoading && !breaksData) return `<div class="card"><p class="hint">${t("common.loading")}</p></div>`;
  if (!breaksData) return `<div class="card"><p class="hint">${t("search.no_results")}</p></div>`;
  const groups = breaksData.groups || [];
  const triples = groups.filter(g => g.type === "triple").length;
  const pairs = groups.filter(g => g.type === "pair").length;
  const total = triples * 3 + pairs * 2;
  const shiftTabHtml = `<div class="card"><h2>${t("breaks.title")}</h2>
    <div class="shift-tabs">${["M","A","N"].map(s => `<button class="shift-tab ${breaksShift === s ? "active" : ""}" data-break-shift="${s}">${t("shift." + s + ".full")}<span class="sub">${t("shift." + s + ".time")}</span></button>`).join("")}</div>
    <p class="breaks-summary">${escapeHtml(t("breaks.header", { shift: t("shift." + breaksShift + ".full"), date: breaksDate }))} · ${escapeHtml(t("breaks.dealers_active", { n: breaksData.presentDealerCount || 0 }))}</p>
    <p class="hint">${escapeHtml(t("breaks.summary", { triples, pairs, total }))} &nbsp;<span class="lock-pill ${breaksData.locked ? "locked" : "unlocked"}">${breaksData.locked ? "🔒 " + t("breaks.locked") : "🔓 " + t("breaks.unlocked")}</span></p>
    ${isAdmin ? `<div class="breaks-actions"><button class="btn ghost small" id="breaks-recompute" ${breaksData.locked ? "disabled" : ""}>${t("breaks.recompute")}</button><button class="btn ghost small" id="breaks-lock-toggle">${breaksData.locked ? t("breaks.unlock") : t("breaks.lock")}</button></div>` : ""}
  </div>`;
  const hourChips = `<div class="hours-strip">${[0,1,2,3,4,5,6,7].map(h => `<span class="hour-chip ${breaksHourOffset === h ? "active" : ""}" data-hour-offset="${h}">${escapeHtml(t("breaks.hour_offset", { h: h+1 }))}</span>`).join("")}</div>`;
  // REQ-3: 서버 employeeInfo 우선, fallback으로 searchResults
  const empInfoMap = breaksData.employeeInfo || {};
  const lookupEmp_ = function(empId) {
    if (!empId) return null;
    const info = empInfoMap[empId];
    if (info) {
      const name = (LANG === "ko" && info.name_ko) ? info.name_ko : (info.name_en || empId);
      return { name, defaultTable: info.defaultTable || "" };
    }
    // fallback (구버전 서버)
    const s = searchResults.find(x => x.id === empId);
    if (s) {
      const name = (LANG === "ko" && s.name_ko) ? s.name_ko : (s.name_en || empId);
      return { name, defaultTable: s.defaultTable || "" };
    }
    return { name: empId, defaultTable: "" };
  };
  const groupsHtml = groups.length === 0 ? `<p class="hint">${t("breaks.no_dealers")}</p>` :
    groups.map((g, i) => {
      const titleKey = g.type === "triple" ? "breaks.group_triple" : "breaks.group_pair";
      const slotKeys = g.type === "triple" ? ["00","20","40"] : ["00","30"];
      const rows = slotKeys.map(k => {
        const empId = g.slots[k];
        const info = lookupEmp_(empId);
        const nameLabel = info ? info.name : (empId || "(empty)");
        const tableLabel = info && info.defaultTable ? ` <span class="table-chip">${escapeHtml(info.defaultTable)}</span>` : "";
        const tm = computeSlotTime_(breaksData.shiftStartTime, k, breaksHourOffset, breaksShift);
        return `<div class="row"><span class="time">${escapeHtml(tm)}</span><span class="nm">${escapeHtml(nameLabel)}${tableLabel}</span></div>`;
      }).join("");
      return `<div class="break-group ${g.type === "pair" ? "pair" : ""}"><div class="gh">${escapeHtml(t(titleKey, { n: i + 1 }))}</div><div class="break-slots">${rows}</div></div>`;
    }).join("");
  const dealerBreaksHtml = `<div class="card"><h2>${t("breaks.dealer_breaks")}</h2>${hourChips}${groupsHtml}</div>`;
  const sbsByEmp = {};
  (breaksData.supervisorBreaks || []).forEach(b => { if (!sbsByEmp[b.supervisorId]) sbsByEmp[b.supervisorId] = []; sbsByEmp[b.supervisorId].push(b); });
  const supervisorCards = (breaksData.supervisors || []).filter(s => s.defaultShift === breaksShift).map(s => {
    const myBreaks = sbsByEmp[s.id] || [];
    const name = (LANG === "ko" && s.name_ko) ? s.name_ko : (s.name_en || s.id);
    // REQ-2/REQ-3: 슈퍼바이저 카드에 국적 + 테이블
    const supExtras = [];
    if (s.nationality) supExtras.push(escapeHtml(s.nationality));
    if (s.defaultTable) supExtras.push(escapeHtml(s.defaultTable));
    const supExtraStr = supExtras.length ? " · " + supExtras.join(" · ") : "";
    const chips = myBreaks.length === 0 ? `<span class="hint" style="font-size:11px;">${t("breaks.no_slots")}</span>` :
      myBreaks.map(b => `<span class="super-chip">${escapeHtml(b.time)} · ${escapeHtml(String(b.minutes))}m${isAdmin ? `<span class="del" data-super-del="${escapeHtml(b.id)}">×</span>` : ""}</span>`).join("");
    return `<div class="super-card"><div class="sn">${escapeHtml(name)}${supExtraStr ? `<span class="hint" style="font-weight:400; font-size:11px; margin-left:6px;">${supExtraStr}</span>` : ""}</div><div class="super-chips">${chips}</div>${isAdmin ? `<div class="super-add"><input type="time" data-super-time="${escapeHtml(s.id)}" value=""><input type="number" data-super-min="${escapeHtml(s.id)}" value="10" min="5" max="240" step="5"><span class="hint" style="font-size:11px;">m</span><button data-super-add="${escapeHtml(s.id)}">${t("breaks.add_slot")}</button></div>` : ""}</div>`;
  }).join("");
  const supervisorHtml = `<div class="card"><h2>${t("breaks.supervisor_breaks")}</h2>${supervisorCards || `<p class="hint">${t("breaks.no_slots")}</p>`}</div>`;
  return shiftTabHtml + dealerBreaksHtml + supervisorHtml;
}

function computeSlotTime_(shiftStart, slotKey, hourOffset, shift) {
  const [hh, mm] = String(shiftStart || "00:00").split(":").map(Number);
  const slotMin = parseInt(slotKey, 10) || 0;
  let totalMin = (hh * 60) + mm + (hourOffset * 60) + slotMin;
  totalMin = ((totalMin % (24*60)) + 24*60) % (24*60);
  const outH = Math.floor(totalMin / 60);
  const outM = totalMin % 60;
  let s = pad2(outH) + ":" + pad2(outM);
  if (shift === "N" && (hh * 60 + mm + hourOffset * 60 + slotMin) >= 24 * 60) s += " +1d";
  return s;
}

async function recomputeBreaks() {

}

async function openMy() {
  currentScreen = SCREEN_MY;

}

async function loadMyData_(forceFresh) {
  myLoading = true; render();
  const user = bootData.user || {};
  try {
    // C-1(c) (2026-05-26): 3개 API → 1개 통합 호출 getMyView.
    //   서버에서 Promise.all로 직렬화되던 3-fetch 제거.
    // BUG-3 (2026-05-26): forceFresh=true면 SWR 우회, 항상 fresh fetch (옛 데이터 잔류 방지)
    const _a = myAnchor, _s = user.defaultShift;
    const r = await apiGetCached("getMyView", { employeeId: user.id, anchor: _a, shift: _s }, {
      forceFresh: !!forceFresh,
      onUpdate: (fresh) => {
        if (currentScreen === SCREEN_MY && myAnchor === _a) {
          const v = (fresh && fresh.data) || null;
          if (!v) return;
          const rawMap = v.nameMap || {};
          const nameMap = {};
          Object.keys(rawMap).forEach(id => {
            const vv = rawMap[id] || {};
            nameMap[id] = (LANG === "ko" && vv.ko) ? vv.ko : (vv.en || id);
          });
          myData = { anchor: v.anchor, dayStates: v.dayStates, breaksData: v.breaks || null, nameMap };
          myDataFetchedAt = Date.now();  // VERIFY-1
          render();
        }
      }
    });
    if (!r || !r.ok) throw new Error((r && r.error && r.error.message_en) || "getMyView failed");
    // nameMap: 서버에서 { id: {en, ko} } → 클라에서 언어별 단일 문자열 변환
    const rawMap = r.data.nameMap || {};
    const nameMap = {};
    Object.keys(rawMap).forEach(id => {
      const v = rawMap[id] || {};
      nameMap[id] = (LANG === "ko" && v.ko) ? v.ko : (v.en || id);
    });
    myData = {
      anchor: r.data.anchor,
      dayStates: r.data.dayStates,
      breaksData: r.data.breaks || null,
      nameMap: nameMap
    };
    myDataFetchedAt = Date.now();  // VERIFY-1
  } catch (err) {
    showToast(t("toast.action_failed", { msg: err.message || err }));
    myData = null;
  }
  myLoading = false; render();
}

function findMyGroup_(userId, breaksData) {
  if (!breaksData || !breaksData.groups) return null;
  for (let i = 0; i < breaksData.groups.length; i++) {
    const g = breaksData.groups[i];
    const slots = g.slots || {};
    const keys = g.type === "triple" ? ["00","20","40"] : ["00","30"];
    for (let j = 0; j < keys.length; j++) {
      if (slots[keys[j]] === userId) {
        return { groupIndex: i, group: g, mySlot: keys[j] };
      }
    }
  }
  return null;
}

function renderMy_(user) {
  if (myLoading && !myData) return `<div class="card"><p class="hint">${t("common.loading")}</p></div>`;
  if (!myData) return `<div class="card"><p class="hint">${t("toast.action_failed", { msg: "load failed" })}</p></div>`;

  const name = (LANG === "ko" && user.name_ko) ? user.name_ko : (user.name_en || user.id);
  // REQ-2/REQ-3: 부제에 국적 + 테이블 추가
  const subExtras = [];
  if (user.nationality) subExtras.push(escapeHtml(user.nationality));
  if (user.defaultTable) subExtras.push(escapeHtml(user.defaultTable));
  const subExtraStr = subExtras.length ? " · " + subExtras.join(" · ") : "";
  // VERIFY-1: 데이터 신선도 + 셀 상태별 카운트 (관리자랑 비교 가능)
  let counts = { vac: 0, off: 0, pre: 0, spl: 0 };
  Object.values(myData.dayStates || {}).forEach(c => {
    if (!c || !c.state) return;
    if (c.state === "vacation") counts.vac++;
    else if (c.state === "dayoff") counts.off++;
    else if (c.state === "pre_practice") counts.pre++;
    else if (c.state === "special") counts.spl++;
  });
  const totalCells = counts.vac + counts.off + counts.pre + counts.spl;
  const fetchedTime = myDataFetchedAt ? new Date(myDataFetchedAt) : null;
  const fetchedStr = fetchedTime
    ? pad2(fetchedTime.getHours()) + ":" + pad2(fetchedTime.getMinutes()) + ":" + pad2(fetchedTime.getSeconds())
    : "—";
  const summaryStr = totalCells > 0
    ? escapeHtml(t("my.cell_summary", { n: totalCells, vac: counts.vac, off: counts.off, pre: counts.pre, spl: counts.spl }))
    : escapeHtml(t("my.no_cells"));
  const headerCard = `<div class="card">
    <h2>${escapeHtml(name)}</h2>
    <p class="hint">${escapeHtml(user.category)} · ${escapeHtml(t("shift." + user.defaultShift + ".full"))} · ${escapeHtml(t("shift." + user.defaultShift + ".time"))}${subExtraStr}</p>
    <p class="hint" style="margin-top:6px; font-size:11px; opacity:0.85;">⟳ ${escapeHtml(t("my.last_updated", { time: fetchedStr }))} · ${summaryStr}</p>
  </div>`;

  // Today's Breaks
  let todayCard = "";
  const myGroup = findMyGroup_(user.id, myData.breaksData);
  if (!myGroup) {
    todayCard = `<div class="card">
      <h2>${t("my.todays_breaks")} · ${escapeHtml(todayIso())}</h2>
      <p class="hint">${t("my.no_breaks_today")}</p>
    </div>`;
  } else {
    const slotKey = myGroup.mySlot;
    const shiftStart = myData.breaksData.shiftStartTime || "00:00";
    const shift = myData.breaksData.shift;
    const times = [];
    for (let h = 0; h < 8; h++) {
      times.push(computeSlotTime_(shiftStart, slotKey, h, shift));
    }
    const rowsHtml = times.map((tm, i) => `<div class="my-break-row ${i === 0 ? "first" : ""}"><span class="clock">⏰</span><span class="time">${escapeHtml(tm)}</span>${i === 0 ? `<span class="label">— ${t("my.first_break")}</span>` : ""}</div>`).join("");
    // 묶음 동료
    const order = myGroup.group.type === "triple" ? ["00","20","40"] : ["00","30"];
    const mates = order.filter(k => k !== slotKey).map(k => myGroup.group.slots[k]).filter(Boolean);
    const mateNames = mates.map(id => myData.nameMap[id] || id).join(", ");
    const typeLabel = myGroup.group.type === "triple" ? "triple" : "pair";
    const groupInfoHtml = mates.length > 0
      ? `<div class="my-group-info">${escapeHtml(t("my.group_with", { type: typeLabel, names: mateNames }))}</div>`
      : `<div class="my-group-info">${escapeHtml(t("my.group_alone", { type: typeLabel }))}</div>`;
    todayCard = `<div class="card">
      <h2>${t("my.todays_breaks")} · ${escapeHtml(todayIso())}</h2>
      <div class="my-breaks-list">${rowsHtml}</div>
      ${groupInfoHtml}
    </div>`;
  }

  // 본인 4주 캘린더 (read-only)
  const dayStates = myData.dayStates || {};
  const anchorIso = myData.anchor || myAnchor;
  const today = todayIso();
  const days = [];
  for (let i = 0; i < 28; i++) {
    const iso = fmtDate(addDays(parseDate(anchorIso), i));
    const cell = dayStates[iso];
    days.push({ iso, day: parseDate(iso).getDate(), state: cell ? cell.state : "work", isToday: iso === today });
  }
  const dowKeys = ["calendar.mon","calendar.tue","calendar.wed","calendar.thu","calendar.fri","calendar.sat","calendar.sun"];
  const dowHeader = dowKeys.map((k, i) => `<div class="head ${i===5?"sat":i===6?"sun":""}">${t(k)}</div>`).join("");
  const cells = days.map(d => {
    const cls = ["day-cell", "viewer"];
    if (d.state === "vacation") cls.push("vac");
    else if (d.state === "dayoff") cls.push("off");
    else if (d.state === "pre_practice") cls.push("pre");
    else if (d.state === "special") cls.push("spl");
    if (d.isToday) cls.push("today");
    const lblText = d.state === "vacation" ? t("state.vacation.short") : d.state === "dayoff" ? t("state.dayoff.short") : d.state === "pre_practice" ? t("state.pre_practice.short") : d.state === "special" ? t("state.special.short") : "";
    return `<div class="${cls.join(" ")}"><span class="d">${d.day}</span>${lblText?`<span class="lbl">${lblText}</span>`:""}</div>`;
  }).join("");

  const calendarCard = `<div class="card">
    <h2>${t("my.schedule_4w")}</h2>
    <div class="anchor-nav" style="margin-bottom:8px;">
      <button class="ghost" data-my-anchor-delta="-28">${t("common.prev_4w")}</button>
      <span class="range">${escapeHtml(rangeLabel(anchorIso))}</span>
      <button class="ghost" data-my-anchor-delta="0">${t("common.today")}</button>
      <button class="ghost" data-my-anchor-delta="28">${t("common.next_4w")}</button>
    </div>
    <div class="legend" style="margin-bottom:8px;">
      <span class="legend-item"><span class="swatch" style="background:var(--vac)"></span>${t("state.vacation.short")}</span>
      <span class="legend-item"><span class="swatch" style="background:var(--off)"></span>${t("state.dayoff.short")}</span>
      <span class="legend-item"><span class="swatch" style="background:var(--pre)"></span>${t("state.pre_practice.short")}</span>
      <span class="legend-item"><span class="swatch" style="background:var(--spl)"></span>${t("state.special.short")}</span>
    </div>
    <div class="calendar">${dowHeader}${cells}</div>
  </div>`;

  const contactCard = `<div class="card"><p class="hint">${t("my.contact_admin_for_off")}</p></div>`;

  return headerCard + todayCard + calendarCard + contactCard;
}

async function moveMyAnchor(days) {
  if (days === 0) myAnchor = mondayOfThisWeek();
  else myAnchor = fmtDate(addDays(parseDate(myAnchor), days));
  // BUG-3: anchor 이동도 명시 액션 → 강제 fresh
  await loadMyData_(true);
}

function renderCycleCard_(c, today, isAdmin) {
  const startIso = c.startDate || "";

  if (startIso && endIso && startIso <= today && today <= endIso) badge = t("cycle.current");
  else if (endIso && endIso < today) badge = t("cycle.past");
  const days = (startIso && endIso)
    ? (Math.round((parseDate(endIso) - parseDate(startIso)) / 86400000) + 1)
    : 0;
  const name = escapeHtml(c.name || c.id);
  const isCurrent = badge === t("cycle.current");
  return `<div class="staff-mgmt-card">
    <div class="top">
      <div>
        <div class="nm">${name} <span class="badge-active">${escapeHtml(badge)}</span></div>

// 부팅 + 이벤트

async function boot() {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }
  setLang(detectInitialLang());
  document.getElementById("loading-text").textContent = t("common.loading");

  // P2-3 (2026-05-26): localStorage → 메모리 캐시 복원 (네트워크 0)
  hydrateCacheFromStorage_();

  try {
    // P2-1 (2026-05-26): getBoot — ping + 첫 화면 데이터 한 응답
    const r = await apiGet("getBoot");
    if (!r || !r.ok) {
      const code = (r && r.error && r.error.code) || "INTERNAL";
      const msg = (r && r.error && (LANG === "ko" ? r.error.message_ko : r.error.message_en)) || t("error.internal");
      showAuthError(code, msg); return;
    }
    let saved = null; try { saved = localStorage.getItem("scheduleApp.lang"); } catch (e) {}
    if (!saved && r.lang) setLang(r.lang);
    bootData = r.data;
    loadPersistedState(bootData.user);

    // P2-1: admin이면 initialSearch를 캐시에 미리 seed → Find Dealer 클릭 즉시
    if (bootData.user.isAdmin && bootData.initialSearch) {
      seedSearchCacheFromBoot_(bootData.initialSearch);
    }
    // P2-1: viewer면 myView 즉시 노출 (추가 fetch 없이)
    if (!bootData.user.isAdmin && bootData.myView) {
      const v = bootData.myView;
      const rawMap = v.nameMap || {};
      const nameMap = {};
      Object.keys(rawMap).forEach(id => {
        const vv = rawMap[id] || {};
        nameMap[id] = (LANG === "ko" && vv.ko) ? vv.ko : (vv.en || id);
      });
      myData = { anchor: v.anchor, dayStates: v.dayStates, breaksData: v.breaks || null, nameMap };
      myAnchor = v.anchor || myAnchor;
      myDataFetchedAt = Date.now();  // VERIFY-1
    }

    if (!bootData.user.isAdmin) {
      currentScreen = SCREEN_MY;
      bindEvents();
      // myData가 이미 있으면 render만, 없으면 openMy로 폴백
      if (myData) render(); else openMy();
    } else {
      currentScreen = SCREEN_HOME;
      render();
      bindEvents();
      // P2-5: 백그라운드 prefetch (홈 그리기 끝난 뒤)
      schedulePrefetch_();
    }
  } catch (err) {
    if (err && err.name === "AbortError") showAuthError("TIMEOUT", t("error.network") + " (timeout)");
    else showAuthError("NETWORK", t("error.network") + " — " + (err && err.message ? err.message : err));
  }
}

// P2-1: getBoot.initialSearch를 캐시에 seed → 첫 Find Dealer 클릭 시 fetch 0회
function seedSearchCacheFromBoot_(initial) {
  const key = cacheKey_("searchStaff", { q: "", shift: "all", category: "all", active: "true", limit: 50, offset: 0 });
  const value = { ok: true, data: initial, lang: LANG };
  readCache.set(key, { expires: Date.now() + READ_CACHE_TTL_MS, value: value });
  persistCacheKey_(key, value);
}

// P2-5: boot 후 백그라운드 prefetch — 자주 진입하는 화면만 가볍게
function schedulePrefetch_() {
  setTimeout(() => {
    // listShiftCycles — Shift Cycle 진입 즉시 캐시 hit
    apiGetCached("listShiftCycles").catch(() => {});
  }, 400);  // 홈 렌더 완료 후 400ms
}

// BUG-3 (2026-05-26): 화면 visibility 복귀(다른 앱 갔다가 돌아옴) 시 현재 화면 자동 새로고침.
// 공유 schedule 데이터의 staleness 윈도우 추가 단축.
document.addEventListener("visibilitychange", function() {
  if (document.visibilityState !== "visible" || !bootData) return;
  if (currentScreen === SCREEN_MY) loadMyData_(true);
  else if (currentScreen === SCREEN_BREAKS) loadBreaks_(true);
  else if (currentScreen === SCREEN_CALENDAR && selectedStaff) {
    // 캐시 무효화 후 다시 진입
    invalidateCache("getStaffDetail");
    openCalendar(selectedStaff.id, selectedStaff.name);
  }
});

// REFRESH-1 (2026-05-26): 컨텍스트 인식 새로고침 — 현재 화면에 맞는 fresh fetch.
async function manualRefresh() {
  const btn = document.getElementById("refresh-btn");
  if (btn) { btn.classList.remove("spinning"); void btn.offsetWidth; btn.classList.add("spinning"); }
  try {
    if (currentScreen === SCREEN_MY) {
      await loadMyData_(true);
    } else if (currentScreen === SCREEN_BREAKS) {
      await loadBreaks_(true);
    } else if (currentScreen === SCREEN_CALENDAR && selectedStaff) {
      invalidateCache("getStaffDetail");
      await openCalendar(selectedStaff.id, selectedStaff.name);
    } else if (currentScreen === SCREEN_FIND_DEALER) {
      invalidateCache("searchStaff");
      triggerSearch();
    } else if (currentScreen === SCREEN_STAFF) {
      invalidateCache("searchStaff");
      await loadStaffList_();
    } else if (currentScreen === SCREEN_CYCLE) {
      invalidateCache("listShiftCycles");
      await loadCycles_();
    } else if (currentScreen === SCREEN_HOME) {
      // 홈에선 ping 결과 갱신 — 별도 처리 불필요. 토스트만.
    }
    showToast(t("common.refreshed"), 1400);
  } catch (err) {
    showToast(t("toast.action_failed", { msg: err.message || err }));
  }
}

function bindEvents() {
  const toggle = document.getElementById("lang-toggle");
  if (!toggle.dataset.bound) { toggle.addEventListener("click", () => { setLang(LANG === "en" ? "ko" : "en"); render(); }); toggle.dataset.bound = "1"; }
  const refresh = document.getElementById("refresh-btn");
  if (refresh && !refresh.dataset.bound) { refresh.addEventListener("click", manualRefresh); refresh.dataset.bound = "1"; }
  // BATCH-1: Apply 버튼
  const apply = document.getElementById("apply-btn");
  if (apply && !apply.dataset.bound) { apply.addEventListener("click", applyPendingChanges); apply.dataset.bound = "1"; }
  const back = document.getElementById("back-btn");
  if (!back.dataset.bound) {
    back.addEventListener("click", () => {
      if (currentScreen === SCREEN_CALENDAR) {
        // BATCH-1: 미적용 변경 있으면 폐기 확인
        if (Object.keys(pendingCellChanges).length > 0) {
          if (!confirm(t("calendar.discard_pending_confirm", { n: Object.keys(pendingCellChanges).length }))) return;
          pendingCellChanges = {};
        }
        currentScreen = SCREEN_FIND_DEALER; selectedStaff = null; staffDetail = null;
      }
      else if (currentScreen === SCREEN_BREAKS) { currentScreen = SCREEN_HOME; breaksData = null; }
      else if (currentScreen === SCREEN_STAFF) { currentScreen = SCREEN_HOME; staffListData = null; staffEditingId = null; staffAddOpen = false; }
      else if (currentScreen === SCREEN_CYCLE) { currentScreen = SCREEN_HOME; cycleData = null; cycleNewOpen = false; cycleEditingId = null; }
      else if (currentScreen === SCREEN_MY) {
        // viewer는 뒤로 가도 화면 5 그대로. admin은 홈으로.
        if (bootData && bootData.user && bootData.user.isAdmin) { currentScreen = SCREEN_HOME; myData = null; }
        else return;  // viewer는 무시
      }
      else { currentScreen = SCREEN_HOME; }
      render();
    });
    back.dataset.bound = "1";
  }
  const mainEl = document.getElementById("main");
  if (!mainEl.dataset.bound) {
    mainEl.addEventListener("click", async (e) => {
      const navBtn = e.target.closest("[data-nav]");
      if (navBtn) {
        if (navBtn.dataset.nav === SCREEN_BREAKS) { openBreaks(); return; }
        if (navBtn.dataset.nav === SCREEN_MY) { openMy(); return; }
        if (navBtn.dataset.nav === SCREEN_STAFF) { openStaffMgmt(); return; }
        if (navBtn.dataset.nav === SCREEN_CYCLE) { openCycleMgmt(); return; }
        // REQ-5 (2026-05-26): Vacation Range → Find Dealer로 이동 + 안내
        if (navBtn.dataset.nav === "vacation_range") {
          navigate(SCREEN_FIND_DEALER);
          showToast(t("placeholder.vacation_range.desc"), 3500);
          return;
        }
        navigate(navBtn.dataset.nav); return;
      }
      const shiftBtn = e.target.closest("[data-shift]");
      if (shiftBtn) { setShift(shiftBtn.dataset.shift); return; }
      const breakShiftBtn = e.target.closest("[data-break-shift]");
      if (breakShiftBtn) { breaksShift = breakShiftBtn.dataset.breakShift; breaksHourOffset = 0; loadBreaks_(true); return; }
      const anchorBtn = e.target.closest("[data-anchor-delta]");
      if (anchorBtn) {
        const delta = parseInt(anchorBtn.dataset.anchorDelta, 10);
        if (currentScreen === SCREEN_CALENDAR && staffDetail) {
          if (delta === 0) currentAnchor = mondayOfThisWeek();
          else currentAnchor = fmtDate(addDays(parseDate(staffDetail.anchor || currentAnchor), delta));
          try { localStorage.setItem("scheduleApp.anchor", currentAnchor); } catch (e) {}
          openCalendar(selectedStaff.id, selectedStaff.name);
        } else moveAnchor(delta);
        return;
      }
      // 본인 화면 anchor
      const myAnchorBtn = e.target.closest("[data-my-anchor-delta]");
      if (myAnchorBtn) { moveMyAnchor(parseInt(myAnchorBtn.dataset.myAnchorDelta, 10)); return; }
      const card = e.target.closest("[data-staff-id]");
      if (card) { openCalendar(card.dataset.staffId, card.dataset.staffName); return; }
      const cell = e.target.closest("[data-cell-date]");
      if (cell) { if (!(bootData && bootData.user && bootData.user.isAdmin)) return; toggleCell(cell.dataset.cellDate, cell.dataset.cellState); return; }
      if (e.target.id === "vac-apply") { applyVacationRange(); return; }
      const hourChip = e.target.closest("[data-hour-offset]");
      if (hourChip) { breaksHourOffset = parseInt(hourChip.dataset.hourOffset, 10); render(); return; }
      if (e.target.id === "breaks-recompute") { recomputeBreaks(); return; }
      if (e.target.id === "breaks-lock-toggle") { toggleBreakLock(); return; }
      const addSup = e.target.closest("[data-super-add]");
      if (addSup) { addSupervisorSlot(addSup.dataset.superAdd); return; }
      const delSup = e.target.closest("[data-super-del]");
      if (delSup) { deleteSupervisorSlot(delSup.dataset.superDel); return; }

      // 8단계 — Staff Management
      if (e.target.id === "staff-add-toggle") { staffAddOpen = !staffAddOpen; render(); return; }
      if (e.target.id === "new-save") { addStaffSubmit(); return; }
      const editBtn = e.target.closest("[data-staff-edit]");
      if (editBtn) { staffEditingId = editBtn.dataset.staffEdit; render(); return; }
      if (e.target.dataset && e.target.dataset.staffCancelEdit) { staffEditingId = null; render(); return; }
      const saveBtn = e.target.closest("[data-staff-save]");
      if (saveBtn) { saveStaffEdit(saveBtn.dataset.staffSave); return; }
      const leaveBtn = e.target.closest("[data-staff-leave]");
      if (leaveBtn) { leaveStaff(leaveBtn.dataset.staffLeave, leaveBtn.dataset.staffName); return; }
      const restoreBtn = e.target.closest("[data-staff-restore]");
      if (restoreBtn) { restoreStaff(restoreBtn.dataset.staffRestore); return; }

      // M-4 — Shift Cycle
      if (e.target.id === "cycle-add-toggle") { cycleNewOpen = !cycleNewOpen; render(); return; }
      if (e.target.id === "cycle-new-save") { createCycleSubmit(); return; }
      const cycleEndBtn = e.target.closest("[data-cycle-end]");
      if (cycleEndBtn) { endCycle(cycleEndBtn.dataset.cycleEnd, cycleEndBtn.dataset.cycleName); return; }
    });
    mainEl.dataset.bound = "1";
  }

  // 8단계: 검색/필터 input/change 위임 (별도)
  const mainEl2 = document.getElementById("main");
  if (!mainEl2.dataset.bound2) {
    mainEl2.addEventListener("input", (e) => {
      if (e.target.id === "staff-search") {
        staffSearchQ = e.target.value;
        if (window._staffSearchTid) clearTimeout(window._staffSearchTid);
        window._staffSearchTid = setTimeout(() => loadStaffList_(), 300);
      }
    });
    mainEl2.addEventListener("change", (e) => {
      if (e.target.id === "staff-filter") { staffFilter = e.target.value; render(); }
    });
    mainEl2.dataset.bound2 = "1";
  }
}

function showAuthError(code, message) {
  let icon = "⚠️", title = message, sub = "";
  const tg = window.Telegram && window.Telegram.WebApp;
  const dbg = tg ? { hasTg: true, initDataLen: tg.initData ? tg.initData.length : 0, userId: (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || "(none)", platform: tg.platform || "(none)" } : { hasTg: false };
  if (code === "USER_NOT_REGISTERED") { icon = "🔒"; title = t("error.not_registered"); }
  else if (code === "AUTH_MISSING" || code === "AUTH_INVALID" || code === "AUTH_EXPIRED") {
    icon = "🔐"; title = (code === "AUTH_MISSING") ? t("error.auth_missing") : (code === "AUTH_INVALID") ? t("error.auth_invalid") : t("error.auth_expired");
    sub = "DEBUG: " + JSON.stringify(dbg);
  } else if (code === "NETWORK" || code === "TIMEOUT") { icon = "📡"; title = t("error.network"); sub = message; }
  else { icon = "❌"; title = message || t("error.internal"); }
  const loading = document.getElementById("loading");
  loading.innerHTML = `<div class="icon">${icon}</div><h2>${escapeHtml(title)}</h2>${sub ? `<pre>${escapeHtml(sub)}</pre>` : ""}<button class="btn" onclick="location.reload()">${escapeHtml(t("common.refresh"))}</button>`;
  loading.style.display = "flex";
  document.getElementById("app").style.display = "none";
}

document.addEventListener("DOMContentLoaded", boot);
</script>
